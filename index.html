,t:"I trust a well-reasoned plan more than a hunch, even when the hunch has been right before."}]},{code:"RC",name:"Relationships & Connection",blurb:"What you actually filter people through.",items:[{d:"H",t:"I choose who to keep close in my life based on how they make me feel, not just what they offer."},{d:"K",t:"I evaluate relationships mainly by whether they are useful or productive for my goals."},{d:"H",t:"I stay emotionally open with people even when there's a risk of getting hurt."},{d:"K",t:"I keep an emotional distance in most relationships to avoid being vulnerable."},{d:"H",t:"I can tell when someone truly cares about me, even without them saying it."}]},{code:"EA",name:"Emotional Awareness",blurb:"Whether you feel your feelings, or mostly think about them.",items:[{d:"H",t:"I notice and name my emotions as they arise, rather than pushing them aside."},{d:"K",t:"I tend to intellectualize my feelings instead of actually experiencing them."},{d:"H",t:"I let myself feel sadness, joy, or anger fully rather than immediately trying to \u201Cfix\u201D or explain it."},{d:"K",t:"I often distract myself with tasks or thinking so I don't have to sit with uncomfortable emotions."},{d:"K",t:"I often analyze my emotions logically rather than just experiencing them in my body."}]},{code:"CN",name:"Conflict Navigation",blurb:"What wins in a disagreement \u2014 connection or being right.",items:[{d:"H",t:"During conflict, I try to understand how the other person feels before I try to be \u201Cright.\u201D"},{d:"K",t:"In an argument, I focus on facts and being logically correct over the other person's feelings."},{d:"H",t:"I'm willing to say \u201CI was wrong\u201D if it repairs the relationship, even if I could argue my case."},{d:"K",t:"I find it hard to let go of proving my point, even when it damages the relationship."},{d:"H",t:"I can stay emotionally connected to someone even in the middle of a disagreement."}]},{code:"TI",name:"Trust & Intuition",blurb:"How much weight your gut gets versus proof.",items:[{d:"H",t:"I trust my intuition about people and situations, even when I can't back it up with evidence."},{d:"K",t:"I only trust things I can prove, measure, or verify."},{d:"H",t:"I've ignored my gut instinct in the past and regretted it."},{d:"K",t:"I dismiss \u201Cgut feelings\u201D as unreliable compared to solid reasoning."},{d:"K",t:"I trust hard evidence over hunches, even when the hunch turned out to be right before."}]},{code:"EC",name:"Empathy & Compassion",blurb:"Whether others' feelings land in your body, or stay in your head.",items:[{d:"H",t:"I feel other people's pain or joy almost as if it were my own."},{d:"K",t:"I understand other people's situations intellectually, but rarely feel moved by them."},{d:"H",t:"I go out of my way to comfort someone who is hurting, even at a cost to myself."},{d:"K",t:"I keep my compassion in check so it doesn't interfere with clear thinking."},{d:"H",t:"Acts of kindness or connection move me emotionally, sometimes to tears."}]},{code:"AE",name:"Authentic Self-Expression",blurb:"Whether what you show the world matches what you feel.",items:[{d:"H",t:"I speak and act in ways that are true to how I genuinely feel, even if it's not the \u201Csmart\u201D choice."},{d:"K",t:"I often say what's expected or strategic rather than what I actually feel."},{d:"H",t:"I'd rather be authentic and imperfect than polished and guarded."},{d:"K",t:"I carefully manage what I reveal about myself to control how others see me."},{d:"K",t:"I keep my emotional expression measured and controlled around others."}]},{code:"SP",name:"Stress & Pressure Response",blurb:"What you reach for under pressure.",items:[{d:"H",t:"Under stress, I check in with how I feel and let that guide my next step."},{d:"K",t:"Under stress, I shut down my emotions and focus purely on solving the problem."},{d:"H",t:"When overwhelmed, I reach out for emotional connection and support."},{d:"K",t:"When overwhelmed, I withdraw and try to think my way out alone."},{d:"H",t:"I recover faster from stress when I let myself feel and express it rather than suppress it."}]},{code:"VP",name:"Values & Life Priorities",blurb:"What you're actually optimizing for.",items:[{d:"H",t:"Love, connection, and meaning matter more to me than achievement or status."},{d:"K",t:"Success, results, and being right matter more to me than how something feels."},{d:"H",t:"I'd choose a lower-paying path that feels meaningful over a lucrative one that feels empty."},{d:"K",t:"I measure a good life mostly by accomplishments and objective milestones."},{d:"K",t:"I judge whether a decision was \u201Cgood\u201D mainly by its measurable outcome, not how it felt."}]},{code:"CS",name:"Communication Style",blurb:"How you actually talk to people.",items:[{d:"H",t:"I communicate with warmth and emotional honesty, even about difficult topics."},{d:"K",t:"I communicate primarily with logic and facts, keeping emotion out of it."},{d:"H",t:"I tell people how I feel about them directly, rather than assuming they know."},{d:"K",t:"I find it easier to talk about ideas and plans than about feelings."},{d:"H",t:"People describe my communication style as heartfelt and genuine."}]}],vp=["Strongly Disagree","Disagree","Neutral / Sometimes","Agree","Strongly Agree"],wp=[{key:"heart-centered",range:[200,250],name:"Heart-Centered \u2014 Authentic Living",color:Nt,teaser:"You lead with feeling and intuition, and it shows up as real, magnetic authenticity.",summary:"You operate primarily from the heart. You trust feeling and intuition first, and use logic to refine rather than override them. This tends to show up as strong authenticity and relational depth \u2014 genuine, present, and easy to connect with.",strengths:["Deep, trusting relationships built on emotional honesty","Strong intuition that often proves reliable under pressure","Comfort with vulnerability and repair in conflict","A stable sense of self, independent of outside approval"],watchouts:["Decisions can be made too quickly, without enough grounding in facts or consequences","Boundaries can blur \u2014 you may over-give emotionally","High-stakes, data-heavy decisions may need more deliberate analysis"],developmentAreas:"Your growth edge isn't feeling more \u2014 it's building enough structure around your feeling so it doesn't work against you. That means learning to slow a decision down when the stakes are high, protecting your energy so generosity doesn't tip into depletion, and getting comfortable holding two things at once: real compassion for someone, and a clear boundary with them.",relationships:"You bond quickly and deeply, and people generally feel your care without having to ask for it. The risk isn't a lack of connection \u2014 it's discernment: you can extend trust before it's been earned, and stay past the point where the evidence says you should leave.",work:"You thrive in roles built around people, culture, service, or creative judgment. Pure logistics, compliance, or numbers-heavy work will feel like a foreign language you're capable of speaking but don't enjoy speaking.",workingStyleTips:["Before agreeing to a new commitment, pause for 24 hours rather than answering in the moment.","Build one recurring checkpoint into big projects where you deliberately look only at the numbers, timeline, or risk.","Delegate or systematize the purely administrative parts of your work."],handlingDifficulty:"When things get hard, you feel it fully and fast, and you tend to reach outward \u2014 toward people, conversation, connection \u2014 to process it. That keeps you from bottling things up, which is real strength. The risk is processing out loud before you've had a moment to sit with what's actually true, so your first reaction isn't always your most accurate one.",roadmap:[{area:"Boundary Setting Under Emotional Pressure",insight:"Your generosity is real, but it doesn't come with a built-in stop switch \u2014 you tend to keep giving past the point where it costs you, especially with people you love.",steps:["Before saying yes to a request that involves your time or energy, name what saying yes will actually cost you.","Practice one low-stakes \u201Cno\u201D per week to build the muscle before a high-stakes moment needs it.","Notice the bodily sensation that shows up right before you over-commit \u2014 that's your cue to pause."]},{area:"Slowing Down High-Stakes Decisions",insight:"Your intuition is genuinely strong, but on decisions with real financial, legal, or long-term consequences, speed can work against you.",steps:["For any decision over a self-set threshold, build in a mandatory 48-hour pause before committing.","Write the decision out in plain language \u2014 what you're choosing and why \u2014 before acting on it.","Ask one person you trust to play devil's advocate on your biggest calls, on purpose."]},{area:"Distinguishing Intuition from Old Patterns",insight:"Your growth edge isn't feeling less \u2014 it's telling the difference between a fresh read on a situation and a familiar emotional reflex wearing intuition's clothes.",steps:["When a feeling arises, ask: have I felt exactly this before, with a similar person or situation? If yes, slow down.","Keep a short running list of decisions where your gut was right, and where it was actually an old fear.","Bring recurring emotional patterns to a therapist or mentor rather than re-deciding them alone each time."]},{area:"Building Structure Without Losing Warmth",insight:"You can add analytical rigor to your decision-making without becoming someone else \u2014 structure isn't the opposite of heart, it's a container for it.",steps:["Pick one recurring area of life (finances, work commitments) and build a simple, repeatable checklist.","Delegate or automate the purely administrative tasks that drain you without engaging your strengths.","Revisit this roadmap in 3 months and note which habits actually stuck."]}],growth:["Before a big financial, legal, or contractual decision, write out the facts and risks in plain language.","Practice saying no to requests that feel emotionally compelling but don't actually serve you.","Notice the difference between \u201Cthis feels right\u201D and \u201Cthis feels familiar.\u201D","Keep a one-line daily note of a moment you led with logic instead of feeling.","Practice \u201Clet me think about this\u201D as a full, complete response."]},{key:"heart-leaning",range:[150,199],name:"Heart-Leaning \u2014 Integrated, Feeling-First",color:Ta,teaser:"You use both head and heart \u2014 but when they disagree, your heart casts the deciding vote.",summary:"You use both head and heart, but when they conflict, your heart usually gets the final vote. You're capable of analysis and planning, but meaning, connection, and how something feels tend to carry more weight than pure logic.",strengths:["Balanced decision-making that rarely ignores data or feeling","Genuine relationships, with enough self-protection to avoid being taken advantage of","Good instincts, checked \u2014 not overridden \u2014 by reason"],watchouts:["Under stress, the balance can tip further toward the heart than the situation calls for","May avoid necessary hard-nosed analysis because it feels uncomfortable","Worth noticing when a feeling is old pattern or fear, not present-moment truth"],developmentAreas:"You're already integrating both sides more than most \u2014 the refinement now is consistency. The tip toward feeling gets stronger exactly when you're tired, rushed, or emotionally invested, which is precisely when a second opinion from the analytical side matters most. Building a reliable habit for those specific moments, rather than relying on however you happen to feel that day, is the real work.",relationships:"Your relationships are warm and reciprocal, and you're usually able to sense early when something is off \u2014 even if you don't always act on it right away. People experience you as genuine but not naive.",work:"You're comfortable with both feedback loops and gut calls, which makes you effective in ambiguous, people-facing roles. Your risk is deferring to feeling in the specific situations that genuinely call for more rigor \u2014 contracts, hiring, numbers.",workingStyleTips:["Name in advance the 2-3 categories of decision where you'll always force a written pros/cons pass.","When you notice you're avoiding analysis because it feels cold, treat that as a signal to lean in.","Ask a trusted, more analytical colleague to sanity-check your biggest calls."],handlingDifficulty:"You meet difficulty by feeling it honestly first, then figuring out what to do \u2014 which generally serves you well. Where it can go sideways is under real pressure, when an old emotional pattern quietly takes the wheel disguised as intuition.",roadmap:[{area:"Consistency Under Pressure",insight:"You already integrate head and heart well in calm conditions \u2014 the gap shows up specifically when you're tired, rushed, or emotionally invested.",steps:["Pre-decide your 2-3 \u201Calways analyze first\u201D categories (money, hiring, contracts) before you're in the heat of a decision.","Build a simple pros/cons template you reach for automatically under stress.","Set a rule: any decision made while emotionally activated gets revisited 24 hours later."]},{area:"Recognizing Old Patterns Disguised as Instinct",insight:"Under real pressure, familiar emotional reflexes (fear of conflict, need to be liked) can borrow your intuition's voice.",steps:["Ask, in hard moments: is this what the situation calls for, or a familiar reflex?","Track decisions weekly where you later realized fear was driving, not insight.","Loop in a second opinion specifically on relationship or conflict decisions."]},{area:"Doing the Analysis You'd Rather Skip",insight:"You can avoid necessary hard-nosed analysis because it feels emotionally cold, not because it's actually unnecessary.",steps:["Notice when \u201CI'll just trust my gut\u201D shows up for a decision that actually has real stakes.","Ask a more analytical colleague or friend to sanity-check big calls before, not after.","Give yourself permission to be temporarily \u201Cunfeeling\u201D in service of a better outcome."]},{area:"Calibrating Your Own Track Record",insight:"You don't yet have a clear, evidence-based sense of when your heart is right and when your head is \u2014 most people never build this.",steps:["Keep a short decision log: what you chose, which side led, how it turned out.","Review it monthly, not just after big wins or failures.","Use the pattern you find to adjust how much weight you give each side going forward."]}],growth:["When the stakes are high and unfamiliar, slow down and build a simple pros/cons list.","Ask yourself whether reluctance to analyze is a values statement, or just discomfort.","Keep a short log of decisions where the head was right and the heart was wrong.","Once a month, revisit a stressful decision and ask what a calmer you would've done.","Practice stating your logical reasoning out loud to someone else."]},{key:"head-leaning",range:[100,149],name:"Head-Leaning \u2014 Integrated, Thinking-First",color:Ma,teaser:"You use both head and heart \u2014 but logic usually wins the tie-break.",summary:"You use both head and heart, but logic usually wins the tie-break. You value being right, being prepared, and being able to justify your choices. Feelings are noticed, but filtered through analysis before you act on them.",strengths:["Clear-headed, well-reasoned decisions, especially under pressure","Reliability \u2014 people trust your judgment because it's consistent","Not easily swept away by a passing emotion"],watchouts:["Relationships can read as guarded, or like you're managing them rather than being in them","Intuition may get overridden even when correct, because it isn't \u201Cprovable\u201D","Unexpressed feelings tend to surface later as stress or distance"],developmentAreas:"The work for you isn't becoming less rigorous \u2014 it's letting feeling in as a legitimate input rather than noise to be managed around. That starts small: noticing a feeling without immediately explaining it away, and treating a gut instinct as a real data point worth weighing, even when it can't yet be justified on paper.",relationships:"People generally experience you as competent and trustworthy, but may have to work harder to feel truly close to you, since connection gets filtered through analysis first. You show love through reliability more than through words.",work:"You're well-suited to complex, high-stakes decisions where being right matters more than being warm. The same wiring can make you slow to sit with a win, a loss, or any strong emotion \u2014 including other people's.",workingStyleTips:["In meetings, ask \u201Chow does this land for people\u201D as a standing question, not an afterthought.","When you dismiss an instinct because you can't prove it, write it down anyway and check back later.","Build in real recovery time after high-output periods."],handlingDifficulty:"Under difficulty, you default to solving \u2014 you get quiet, analytical, and focused on the fix, which genuinely works for a lot of problems. What it doesn't do is process the emotional residue of the difficulty itself, which tends to sit unresolved and surface later.",roadmap:[{area:"Letting Feeling Count as Data",insight:"You treat emotion as noise to manage around rather than a legitimate input \u2014 even when it's accurate.",steps:["When you dismiss an instinct because you can't prove it, write it down anyway and check back later.","Before finalizing a decision, explicitly ask \u201Chow does this feel,\u201D not just \u201Cdoes this hold up.\u201D","Practice treating a strong gut reaction as a hypothesis worth testing, not noise to filter out."]},{area:"Making Relationships Feel as Close as They Are",insight:"People trust your judgment but may not feel close to you, because warmth doesn't reliably make it to the surface.",steps:["Add one sentence of feeling or impact to feedback you give, not just facts and outcomes.","Say the appreciative thing out loud instead of assuming it's understood.","Ask someone close what they wish you expressed more, and act on the answer."]},{area:"Processing Instead of Postponing Emotion",insight:"Under difficulty, you solve and move on \u2014 the emotional residue doesn't disappear, it resurfaces later as tension or distance.",steps:["Name one emotion out loud, even briefly, before moving to solutions.","After a stressful project, ask how it felt, not just whether it succeeded.","Build in real recovery time after high-output periods, not just after visible burnout."]},{area:"Recovering the Muscle of Feeling",insight:"Emotional awareness is a muscle like any other \u2014 under-used, it genuinely atrophies, and that's reversible with practice.",steps:["Once a week, make one small decision purely on feeling and notice what happens.","Sit with an unresolved feeling for five minutes without trying to fix or explain it.","Reflect someone's feeling back to them before offering a solution, at least once a day."]}],growth:["Once a week, make one small decision purely on how it feels.","When someone shares a problem, try reflecting their feeling back before offering a solution.","Name one emotion out loud each day, even a mundane one.","After finishing a stressful project, ask yourself how it felt, not just whether it succeeded.","Practice sitting with an unresolved feeling for five minutes without trying to fix it."]},{key:"head-dominant",range:[50,99],name:"Head-Dominant \u2014 Detached / Analytical",color:sa,teaser:"Logic, control, and analysis are your default setting \u2014 composed on the outside, sometimes distant on the inside.",summary:"You operate primarily from the head. Logic, control, and analysis are your default mode, and emotional input \u2014 yours and others' \u2014 is often minimized or arrives late. This can look like competence from the outside, while feeling like distance from the inside.",strengths:["Composure and clarity in high-pressure or high-stakes situations","Objectivity \u2014 less prone to being derailed by emotional reactivity","Strong follow-through once a decision is made"],watchouts:["Relationships may feel one-sided or shallow to others, even with good intent","Suppressed emotion tends to leak out as tension, health symptoms, or sudden overreaction","Intuition is real data \u2014 dismissing it entirely removes useful information"],developmentAreas:"The growth path here is reconnecting with feeling as information, not weakness. That's not about becoming a different kind of person \u2014 it's about noticing that a physical stress signal, or a nagging sense that something's off, is data your analytical mind hasn't caught up to yet, and it deserves a seat at the table rather than automatic dismissal.",relationships:"Others may read you as composed but hard to reach. The depth of your care is often real but doesn't reliably make it to the surface where people can feel it, which can leave them guessing where they stand with you.",work:"You're a strong asset under pressure, in ambiguity, or in any high-stakes analytical role. Unprocessed emotion in this profile tends not to disappear \u2014 it tends to resurface later as tension, health symptoms, or an unexpected blow-up.",workingStyleTips:["Schedule genuine unstructured time with colleagues or team members.","When giving feedback, add one sentence about impact or feeling, not just facts and outcomes.","Before a high-stakes call, check in on your physical state as a real input."],handlingDifficulty:"You handle difficulty by controlling what you can and analyzing your way through the rest, which makes you genuinely steady in a crisis. The cost shows up afterward: emotion that never got processed doesn't disappear, it resurfaces later as tension or a health symptom that seems to come from nowhere.",roadmap:[{area:"Treating Physical Signals as Information",insight:"A tight chest or a nagging sense something's off is data your analytical mind hasn't caught up to yet \u2014 not a distraction from the \u201Creal\u201D analysis.",steps:["Before a high-stakes call, check in on your physical state as a real input.","When you notice a stress signal, pause and name what you're feeling before doing anything else.","Keep a simple log of physical signals and what they later turned out to mean."]},{area:"Making Care Visible, Not Just Real",insight:"Your care is often genuine but doesn't reliably reach the people it's for, which leaves them guessing where they stand.",steps:["Schedule genuine unstructured time with people you trust, with no agenda.","Say the caring thing out loud instead of assuming actions speak for themselves.","Ask directly what someone wishes you expressed more often \u2014 then do it."]},{area:"Preventing the Delayed Cost of Suppressed Emotion",insight:"Emotion that never gets processed doesn't vanish \u2014 it resurfaces later as tension, irritability, or a health symptom that seems to come from nowhere.",steps:["Build a small, regular check-in practice: how am I actually doing, not just what have I accomplished.","Name one feeling in one word each day, without analyzing why.","Notice patterns: does tension spike after specific kinds of unprocessed situations?"]},{area:"Giving Intuition a Real Vote",insight:"Dismissing gut reactions entirely removes a genuine source of information your analytical process doesn't have access to.",steps:["Before dismissing a gut reaction, ask what evidence would need to exist for you to take it seriously.","Write down instincts you overrode and revisit whether they turned out to be right.","Treat a strong, repeated gut signal as equivalent in weight to a moderate amount of data."]}],growth:["Build in unstructured time with people you trust, with no agenda or problem to solve.","When you notice a physical stress signal, pause and name what you're feeling.","Ask someone close what they wish you expressed more often, and take it seriously.","Once a day, name one feeling in one word, without analyzing why you feel it.","Before dismissing a gut reaction, ask what you'd need to see to take it seriously."]}],bp={DM:{whyItMatters:"How you make decisions determines everything downstream \u2014 your career trajectory, your relationships, your finances. Getting this dial right for the decision in front of you, rather than defaulting to one mode automatically, is one of the highest-leverage skills there is.",high:{read:"Decisions come from a felt sense of rightness first, with logic used to sanity-check rather than lead. This serves you well in ambiguous or fast-moving situations.",tip:"Keep leaning on intuition for people-reading and fast calls, but add a deliberate pause for financial, legal, or irreversible decisions."},mid:{read:"You draw on both gut feeling and analysis fairly evenly, adjusting based on the situation.",tip:"Notice which mode you default to under time pressure \u2014 that's usually your true default, worth being aware of."},low:{read:"You won't move until the numbers or the reasoning check out \u2014 even on choices that are really about how something feels.",tip:"For your next personal decision, try deciding on gut feel first, then check it against logic second \u2014 reverse your usual order."}},RC:{whyItMatters:"Relationship quality is one of the strongest predictors of long-term happiness and even physical health. How you filter and choose people shapes who ends up in your life.",high:{read:"You bond with people based on emotional resonance, and you let that closeness show.",tip:"Keep trusting your read on people, but build in one evidence check for new relationships before extending full trust."},mid:{read:"You balance emotional connection with practical judgment when choosing who to let close.",tip:"Notice if you evaluate new vs. established relationships differently \u2014 consistency here compounds."},low:{read:"You keep relationships at arm's length and tend to evaluate them by what they do for you.",tip:"Pick one relationship this month and share something real and non-strategic \u2014 practice connection without an agenda."}},EA:{whyItMatters:"You can't manage what you can't feel. Emotional awareness is the foundation every other emotional skill \u2014 empathy, regulation, communication \u2014 is built on.",high:{read:"You feel your emotions in real time and let them inform you before you explain them away.",tip:"Keep the practice, and start naming emotions with more precision \u2014 the specific word deepens the skill."},mid:{read:"You notice emotions some of the time, though they can slip past you when you're busy or stressed.",tip:"Set a daily two-minute check-in: name what you're feeling, no analysis required."},low:{read:"You tend to think about feelings rather than actually feel them, which can leave you reading your own signals late.",tip:"Pause at transition points in your day \u2014 before a meeting, after a call \u2014 and ask what you're actually feeling right now."}},CN:{whyItMatters:"Every close relationship will have conflict. How you navigate it \u2014 repair vs. rupture \u2014 determines whether relationships get stronger over time or slowly erode.",high:{read:"Staying close to someone matters more to you, in the moment, than winning the argument.",tip:"Keep prioritizing repair, but make sure you're not avoiding necessary confrontations just to keep the peace."},mid:{read:"You can hold your ground and repair a relationship, depending on the stakes of the disagreement.",tip:"Notice your pattern with specific people \u2014 do you always yield to some and never to others?"},low:{read:"Being right tends to outweigh staying connected, especially once a disagreement escalates.",tip:"In your next disagreement, ask the other person what they need to feel heard before making your own case."}},TI:{whyItMatters:"Intuition is pattern recognition your conscious mind hasn't caught up to yet. Dismissing it entirely, or trusting it blindly, both cost you good information.",high:{read:"Your gut gets a real vote, without needing proof \u2014 and you've learned, mostly, to trust it.",tip:"Keep honoring your gut, and start keeping a light log of when it's right vs. wrong to sharpen your calibration."},mid:{read:"You weigh intuition alongside evidence, giving neither automatic priority.",tip:"Notice the situations where you override your gut \u2014 is there a pattern to when you don't trust it?"},low:{read:"If it can't be measured or demonstrated, you discount it, even in the moments it turns out to be right.",tip:"Next time a hunch shows up, write it down before you dismiss it, then check back later to see if it was right."}},EC:{whyItMatters:"Empathy is the mechanism through which other people feel understood by you \u2014 it's the difference between being around someone and actually connecting with them.",high:{read:"Other people's emotions genuinely move you, not just register with you intellectually.",tip:"Keep letting yourself feel with others, and build in recovery time so it doesn't tip into emotional exhaustion."},mid:{read:"You can access empathy, though it takes more conscious effort in some situations than others.",tip:"Notice who you find it easiest to empathize with, and practice extending that same effort to people less like you."},low:{read:"You understand what others feel more than you feel it alongside them.",tip:"Next time someone shares a problem, resist offering a solution for the first minute \u2014 just reflect what they're feeling back."}},AE:{whyItMatters:"The gap between how you feel and how you present costs energy every day, and it's the thing other people unconsciously sense as \u201Csomething's off.\u201D",high:{read:"What you show the world lines up with what you actually feel, even when that's inconvenient.",tip:"Keep being real, and notice if there are specific contexts \u2014 work, family \u2014 where you still perform rather than express."},mid:{read:"You're authentic in some contexts and more guarded in others.",tip:"Pick your most guarded context and experiment with one small, honest disclosure."},low:{read:"You manage your image carefully, and what people see isn't always what's underneath.",tip:"Practice one small act of visible authenticity a week \u2014 a genuine reaction, not a curated one."}},SP:{whyItMatters:"Your stress response isn't a character flaw or a virtue \u2014 it's a pattern, and patterns can be worked with once you actually see them clearly.",high:{read:"Under pressure, you turn toward feeling and connection rather than away from them.",tip:"Keep reaching out under stress, and add one grounding practice \u2014 breath, movement \u2014 so you're not relying on others alone to regulate."},mid:{read:"Your stress response shifts depending on the type and intensity of the pressure.",tip:"Notice what kind of stress makes you shut down vs. reach out \u2014 that's useful self-knowledge."},low:{read:"Under pressure, you shut emotion down and retreat into your head to solve your way out alone.",tip:"Next time you're stressed, text one person just to say you're having a hard time \u2014 no solving required."}},VP:{whyItMatters:"What you're actually optimizing for, not what you say you value, quietly steers every major life decision you make.",high:{read:"Meaning and connection outrank achievement in what you're actually optimizing your life for.",tip:"Keep protecting what matters, and sanity-check occasionally that this is a choice, not a way to avoid ambition."},mid:{read:"You hold both meaning and achievement as real priorities, weighing them situationally.",tip:"Notice which one wins when you're tired or under pressure \u2014 that's usually the truer default."},low:{read:"Results and measurable success matter more to you than how a choice feels while you're making it.",tip:"Before your next big decision, ask what you'd choose if no one would ever know the outcome."}},CS:{whyItMatters:"How you communicate determines whether people actually receive what you mean \u2014 the gap between intent and impact lives almost entirely here.",high:{read:"You talk from the heart, plainly, even about hard things.",tip:"Keep the directness, and check occasionally that warmth isn't tipping into oversharing in professional contexts."},mid:{read:"You adjust your communication style depending on the person and the stakes.",tip:"Notice which relationships get your warmer register and which get your more guarded one \u2014 is that intentional?"},low:{read:"You default to facts and ideas in conversation, and feelings rarely make it in.",tip:"In your next important conversation, add one sentence of feeling before you get to the facts."}}},Ap=[{code:"DM",name:"Decision-Making",blurb:"How you make calls that affect your team.",items:[{d:"H",t:"When making an important call about my team, I trust my gut feeling even when I can't fully explain it."},{d:"K",t:"I prefer to map out data and options before deciding anything that affects my team."},{d:"H",t:"Some of my best management decisions have come from what simply felt right, not from careful analysis."},{d:"K",t:"I feel uneasy committing to a team decision until I've thought it through logically."},{d:"K",t:"I trust a well-reasoned plan more than a hunch, even when the hunch about a person or situation has been right before."}]},{code:"RC",name:"Team Relationships & Trust",blurb:"How you build and extend trust with your team.",items:[{d:"H",t:"I choose who to give more autonomy to based on how they make me feel about their reliability, not just their track record on paper."},{d:"K",t:"I evaluate team members mainly by their measurable output and results."},{d:"H",t:"I stay emotionally open with my direct reports even when there's a risk of being let down."},{d:"K",t:"I keep an emotional distance from my team to stay objective."},{d:"H",t:"I can tell when someone on my team is struggling, even before they say anything."}]},{code:"EA",name:"Emotional Awareness at Work",blurb:"Whether you notice your own reactions, or move past them.",items:[{d:"H",t:"I notice and name my own frustration or stress in the moment, rather than pushing it aside during a busy day."},{d:"K",t:"I tend to intellectualize my reactions to workplace setbacks instead of actually feeling them."},{d:"H",t:"I let myself feel disappointment about a project outcome fully rather than immediately moving to \u201Cwhat's next.\u201D"},{d:"K",t:"I often distract myself with tasks so I don't have to sit with how a difficult meeting made me feel."},{d:"K",t:"I analyze my own frustration logically rather than just noticing it in the moment."}]},{code:"CN",name:"Conflict & Difficult Conversations",blurb:"What wins when it's hard \u2014 the relationship or being right.",items:[{d:"H",t:"During a disagreement with a peer or direct report, I try to understand how they feel before I try to be right."},{d:"K",t:"In a workplace disagreement, I focus on facts and being correct over the other person's feelings."},{d:"H",t:"I'm willing to say \u201CI was wrong\u201D in front of my team if it repairs trust, even if I could defend my original call."},{d:"K",t:"I find it hard to let go of proving my point in a meeting, even when it costs team morale."},{d:"H",t:"I can stay warm toward a direct report even in the middle of a hard performance conversation."}]},{code:"TI",name:"Trust & Intuition About People",blurb:"How much weight your read on someone gets versus proof.",items:[{d:"H",t:"I trust my read on a candidate or team member, even when I can't fully justify it on paper."},{d:"K",t:"I only trust what's in the data \u2014 performance reviews, metrics \u2014 not my gut read on someone."},{d:"H",t:"I've ignored my gut instinct about a hire or a risk and regretted it."},{d:"K",t:"I dismiss my gut feeling about a team situation as unreliable compared to hard evidence."},{d:"K",t:"I trust a spreadsheet over a hunch, even when the hunch about a person turned out to be right before."}]},{code:"EC",name:"Empathy for Your Team",blurb:"Whether your team's struggles land with you, or stay at arm's length.",items:[{d:"H",t:"A direct report's stress or frustration genuinely affects me, not just registers as a fact to manage."},{d:"K",t:"I understand my team's struggles intellectually but rarely feel moved by them."},{d:"H",t:"I go out of my way to support a struggling team member, even at a cost to my own workload."},{d:"K",t:"I keep my empathy for my team in check so it doesn't interfere with clear decision-making."},{d:"H",t:"Seeing my team succeed or struggle genuinely moves me emotionally."}]},{code:"AE",name:"Authentic Leadership",blurb:"Whether the leader your team sees matches how you actually feel.",items:[{d:"H",t:"I lead in a way that's true to how I genuinely feel, even when it's not the \u201Csafe\u201D corporate answer."},{d:"K",t:"I often say what's expected of a manager rather than what I actually think."},{d:"H",t:"I'd rather be a genuine, occasionally imperfect leader than a polished, guarded one."},{d:"K",t:"I carefully manage what I reveal to my team to control how I'm perceived as a leader."},{d:"K",t:"I keep my emotional expression measured and controlled around my team."}]},{code:"SP",name:"Stress & Pressure at Work",blurb:"What you reach for under deadline pressure.",items:[{d:"H",t:"Under deadline pressure, I check in with how I feel and let that guide my next step."},{d:"K",t:"Under deadline pressure, I shut down my emotions and focus purely on solving the problem."},{d:"H",t:"When overwhelmed at work, I reach out to a peer or mentor for support."},{d:"K",t:"When overwhelmed at work, I withdraw and try to think my way out alone."},{d:"H",t:"I recover faster from a stressful week when I let myself feel and express it rather than suppress it."}]},{code:"VP",name:"What You're Optimizing For",blurb:"What actually drives your calls when it's close.",items:[{d:"H",t:"Team wellbeing and meaning matter more to me than hitting every metric."},{d:"K",t:"Results and being right matter more to me than how the team feels about how we got there."},{d:"H",t:"I'd choose a harder, more meaningful project over an easy, high-visibility one."},{d:"K",t:"I measure a good quarter mostly by the numbers, not the team's experience getting there."},{d:"K",t:"I judge whether a management decision was \u201Cgood\u201D mainly by the outcome, not how it felt to make it."}]},{code:"CS",name:"Communication as a Manager",blurb:"How you actually talk to your team.",items:[{d:"H",t:"I communicate with warmth and honesty with my team, even about difficult topics like underperformance."},{d:"K",t:"I communicate primarily with facts and logic, keeping emotion out of feedback."},{d:"H",t:"I tell my team how I feel about their work directly, rather than assuming they know."},{d:"K",t:"I find it easier to talk about deliverables and plans than about how people are doing."},{d:"H",t:"My team would describe my communication style as heartfelt and genuine."}]}],Sp=[{key:"heart-centered",range:[200,250],name:"Heart-Centered \u2014 Team-Centered Leadership",color:Nt,teaser:"You lead with feeling and instinct, and your team feels genuinely led, not just managed.",summary:"You lead primarily from the heart. You trust your read on people and situations first, and use data and process to refine rather than override that read. This tends to show up as a leader people trust quickly and follow genuinely, not just because of your title.",strengths:["Direct reports trust you and feel genuinely supported","Strong read on team dynamics and morale, often ahead of the data","Comfortable repairing trust after a misstep","Leads with a stable sense of self, not just what the org wants to see"],watchouts:["Difficult performance conversations can get delayed or softened past the point of usefulness","Team boundaries can blur \u2014 you may absorb your team's stress as your own","High-stakes resourcing or org decisions may need more deliberate analysis than feel alone provides"],developmentAreas:"Your growth edge as a manager isn't caring more \u2014 it's building enough structure around that care so it doesn't work against your team. That means delivering hard feedback on time even when it feels unkind in the moment, and protecting your own capacity so support doesn't tip into absorbing your team's problems as your own.",relationships:"Your team generally trusts you fast, and they feel your investment in them without having to ask for it. The risk is discernment: you can extend trust or slack to someone before it's earned, and hold onto an underperformer past the point the evidence says you should act.",work:"You thrive managing through relationship and culture \u2014 your team feels genuinely led, not just managed. Purely administrative or metrics-first management tasks will feel like a chore you're capable of but don't enjoy.",workingStyleTips:["Before agreeing to protect an underperforming team member \u201Ca little longer,\u201D name out loud what that delay is actually costing the rest of the team.","Build one recurring checkpoint into big team decisions where you deliberately look only at the numbers, timeline, or risk, separate from how it feels.","Delegate or systematize the purely administrative parts of managing \u2014 they drain you disproportionately."],handlingDifficulty:"When your team hits a hard patch, you feel it fully and reach toward connection \u2014 checking in, gathering the team, talking it through. That keeps morale from cratering silently, which is real strength. The risk is reacting to the room's mood before you've had a moment to separate your own feeling from the situation's actual facts.",leadershipImpact:"Reporting to you likely feels safe and genuinely human \u2014 people say what they think because you make it feel low-risk to be honest. The flip side: your team may also sense when you're avoiding a hard call on someone's performance, and over time that can quietly erode trust in your fairness, even while your warmth stays intact.",cultureFitPrompt:"If your organization's culture rewards fast, metrics-first decisions over relationship-building, you may find yourself working against the grain daily \u2014 worth naming honestly: is this friction pushing you to grow, or slowly wearing you down?",roadmap:[{area:"Delivering Hard Feedback On Time",insight:"Your instinct to protect team members you care about can quietly become a habit of delaying feedback until it's overdue.",steps:["Set a personal rule: performance concerns get raised within one week of noticing, not \u201Cwhen the time feels right.\u201D","Before delaying a hard conversation, name out loud what the delay costs the rest of the team.","Practice a scripted opener for hard feedback so the conversation starts even when it feels uncomfortable."]},{area:"Adding Structure to High-Stakes Team Decisions",insight:"On resourcing, promotions, or org changes, speed on instinct can work against you and your team.",steps:["For decisions above a certain impact threshold, build in a mandatory data review before deciding.","Write the decision out in plain language \u2014 what you're choosing and why \u2014 before acting on it.","Ask a trusted peer manager to sanity-check your biggest people calls."]},{area:"Protecting Your Own Capacity",insight:"Absorbing your team's stress as your own is generous, but it isn't sustainable, and it isn't actually what your team needs from you.",steps:["Notice the bodily signal that shows up when you're taking on a team member's stress as your own.","Build one recurring boundary \u2014 a no-meeting block, a hard stop time \u2014 and hold it.","Ask yourself whether staying late to support someone is necessary, or a habit."]},{area:"Building Fair, Consistent Structure",insight:"Structure isn't the opposite of a people-first leadership style \u2014 it's what makes your care fair and repeatable across your whole team, not just your favorites.",steps:["Pick one recurring management process (ratings, 1:1 cadence) and build a simple, consistent checklist.","Delegate or systematize the administrative parts of managing that drain you.","Revisit this roadmap in 3 months and note which habits actually stuck."]}],growth:["Before your next hard conversation, set a date within one week rather than waiting for the 'right moment.'","Practice saying 'let's look at the numbers on this one' as a complete, valid response.","Notice the difference between a team member who needs support and one who needs a consequence.","Keep a one-line weekly note of a moment you led with process instead of feeling.","Block one hour a week that's just for your own recovery, not your team's."]},{key:"heart-leaning",range:[150,199],name:"Heart-Leaning \u2014 People-First, Integrated",color:Ta,teaser:"You manage with both head and heart \u2014 but when they disagree, your read on people usually wins.",summary:"You lead with both head and heart, but when they conflict, your read on people usually wins. You're capable of rigorous analysis, but team morale and relational trust tend to carry more weight than pure metrics.",strengths:["Balanced management decisions that rarely ignore data or team sentiment","Genuine team relationships with enough boundary to avoid being taken advantage of","Good people-instincts, checked not overridden by data"],watchouts:["Under deadline stress, the balance can tip further toward people-pleasing than the situation calls for","May avoid necessary hard metrics conversations because they feel uncomfortable","Worth noticing when leniency with a team member is old pattern (conflict avoidance) rather than present-moment judgment"],developmentAreas:"You're already integrating both sides more than most managers \u2014 the refinement now is consistency, especially under deadline pressure when the pull toward keeping the peace gets strongest, which is exactly when a second, more analytical opinion matters most.",relationships:"Your team relationships are warm and reciprocal, and you usually sense early when someone's struggling \u2014 even if you don't always act on it immediately. Your team experiences you as genuine, not a pushover.",work:"You're comfortable with both structured feedback and gut calls on people, which makes you effective managing through ambiguity. Your risk is deferring to team sentiment in the specific calls that need more rigor \u2014 performance ratings, resourcing, promotions.",workingStyleTips:["Name in advance the decisions (performance ratings, promotions, resourcing) where you'll always force a written, criteria-based pass before deciding.","When you notice you're avoiding a hard metric because it feels uncomfortable, treat that discomfort as a signal to lean in.","Ask a trusted, more data-driven peer manager to sanity-check your biggest calls about people."],handlingDifficulty:"You meet team difficulty by feeling it honestly first, then figuring out what to do \u2014 which generally builds trust. Where it goes sideways is under real pressure, when a fear of conflict quietly takes the wheel disguised as \u201Creading the room.\u201D",leadershipImpact:"Your team likely feels genuinely cared for and safe bringing you problems. The risk: high performers may quietly notice when you let an underperformer coast too long, and start to wonder if the bar actually matters.",cultureFitPrompt:"If your organization runs on hard metrics and fast performance cuts, your people-first instinct may create real friction \u2014 worth asking whether that tension is making you a better check on the culture, or just making your job harder.",roadmap:[{area:"Consistency Under Deadline Pressure",insight:"You integrate people and data well normally \u2014 the gap shows specifically when you're behind on a deadline and emotionally invested in your team.",steps:["Pre-decide which decisions (ratings, promotions, PIPs) always get a written criteria pass, no exceptions.","Build a simple checklist you reach for automatically under deadline stress.","Any people decision made while stressed gets revisited 24 hours later before it's final."]},{area:"Recognizing Conflict-Avoidance Disguised as Instinct",insight:"Under pressure, a fear of confrontation can borrow the voice of \u201Creading the team.\u201D",steps:["Ask, in hard moments: is this what the team needs, or my own discomfort with conflict?","Track weekly when you later realize avoidance was driving, not insight.","Loop in a peer specifically on performance or conflict calls."]},{area:"Doing the Hard Metric Review You'd Rather Skip",insight:"You can avoid a necessary hard conversation about someone's numbers because it feels unkind, not because it's unnecessary.",steps:["Notice when 'they're going through a lot right now' becomes a permanent excuse.","Ask a data-driven peer to sanity-check ratings before you finalize them.","Give yourself permission to be temporarily 'unkind' in service of the team's fairness."]},{area:"Calibrating Your Own Track Record on People Calls",insight:"You don't yet have an evidence-based sense of when your people-read is right and when it's wishful thinking.",steps:["Keep a light log: who you gave the benefit of the doubt to, and how it played out.","Review it quarterly, not just after a blow-up.","Use the pattern to recalibrate how much benefit-of-the-doubt you extend by default."]}],growth:["Before your next performance rating, write the criteria-based case first, then check it against how you feel about the person.","Ask yourself whether avoiding a tough conversation is kindness, or your own discomfort.","Keep a short log of people calls where the data was right and your gut was wrong, and vice versa.","Once a month, revisit a people decision made under deadline stress and ask what a calmer you would've done.","Practice stating the data-driven case out loud to a peer before you make your final call."]},{key:"head-leaning",range:[100,149],name:"Head-Leaning \u2014 Results-First, Integrated",color:Ma,teaser:"You manage with both head and heart \u2014 but logic usually wins the tie-break.",summary:"You manage with both head and heart, but logic usually wins the tie-break. You value being right, being prepared, and defensible decisions. Team sentiment is noticed, but filtered through data before you act on it.",strengths:["Clear-headed, well-reasoned management decisions, especially under pressure","Reliability \u2014 your team trusts your judgment because it's consistent","Not easily swayed by a vocal minority or a bad week"],watchouts:["Team relationships can read as transactional, or like you're managing rather than leading","A good instinct about a person may get overridden because it isn't provable in a review cycle","Team frustration that goes unexpressed for too long tends to surface as attrition or disengagement"],developmentAreas:"The work for you isn't becoming less rigorous \u2014 it's letting team sentiment count as a real input, not noise to manage around. That starts small: noticing team mood without immediately looking for the metric that explains it away.",relationships:"Your team generally experiences you as competent and fair, but may work harder to feel close to you, since warmth gets filtered through your analytical process first. You show you care through consistency, not words.",work:"You're well-suited to managing through complexity and ambiguity, where being right matters more than being warm. The same wiring can make you slow to celebrate a team win or sit with a team's disappointment.",workingStyleTips:["In 1:1s, ask \u201Chow are you actually doing\u201D as a standing question, not an afterthought.","When you dismiss a read on a team member because you can't prove it yet, write it down and check back.","Build in real recovery time for your team after high-output sprints, not just for yourself."],handlingDifficulty:"Under team difficulty, you default to solving \u2014 quiet, analytical, focused on the fix, which works for a lot of problems. What it doesn't do is process the team's emotional residue, which tends to surface later as quiet disengagement.",leadershipImpact:"Your team trusts your judgment and feels safe under your consistency, but may not feel truly seen by you. Over time, your best people may leave not because of bad management, but because they never felt like more than a strong performer to you.",cultureFitPrompt:"If your organization explicitly values a \u201Cpeople-first\u201D culture on paper, your results-first default may create a quiet mismatch worth naming \u2014 are you the counterbalance the culture needs, or out of step with it?",roadmap:[{area:"Letting Team Sentiment Count as Data",insight:"You treat team mood as noise to manage around rather than a legitimate input \u2014 even when it's accurate.",steps:["When you dismiss a read on morale because you can't prove it, write it down anyway and check back later.","Before finalizing a team decision, explicitly ask 'how does this land,' not just 'does this hold up.'","Practice treating a strong read on team mood as a hypothesis worth testing."]},{area:"Making Care Visible to Your Team",insight:"People trust your judgment but may not feel close to you, because warmth doesn't reliably make it to the surface.",steps:["Add one sentence of impact or feeling to feedback you give, not just facts and outcomes.","Say the appreciative thing out loud instead of assuming it's understood.","Ask a direct report what they wish you expressed more, and act on the answer."]},{area:"Processing Team Difficulty Instead of Just Solving It",insight:"Under difficulty, you solve and move on \u2014 the team's emotional residue doesn't disappear, it resurfaces later as disengagement.",steps:["Name the team's likely feeling out loud, even briefly, before moving to solutions.","After a stressful sprint, ask the team how it felt, not just whether it succeeded.","Build in real recovery time after high-output periods, not just after visible burnout."]},{area:"Recovering the Muscle of Noticing Morale",insight:"Noticing team sentiment is a skill like any other \u2014 under-used, it atrophies, and that's reversible with practice.",steps:["Once a week, make one small team call purely on read, and notice what happens.","Sit with an unresolved team tension for a few minutes without trying to fix it immediately.","Reflect a team member's feeling back to them before offering a solution, at least once a day."]}],growth:["Once a week, make one small team decision purely on how it feels, and notice what happens.","When a direct report shares a problem, try reflecting their feeling back before offering a solution.","Name your own reaction out loud in a team meeting at least once a week.","After a stressful project, ask the team how it felt, not just whether it succeeded.","Practice sitting with team tension for five minutes without rushing to fix it."]},{key:"head-dominant",range:[50,99],name:"Head-Dominant \u2014 Command-and-Control, Analytical",color:sa,teaser:"Logic, control, and process are your default setting as a manager \u2014 strong execution, sometimes distant.",summary:"You manage primarily from the head. Logic, control, and process are your default mode, and emotional input from your team is often minimized or arrives late. This can look like strong execution from the outside, while your team experiences distance.",strengths:["Composure and clarity in high-pressure or crisis situations","Objectivity \u2014 your team decisions are less prone to favoritism or reactivity","Strong follow-through once a decision is made"],watchouts:["Team relationships may feel one-sided or purely transactional, even with good intent","Suppressed frustration with the team tends to leak out as tension or a sudden sharp reaction","A read on a team risk is real data \u2014 dismissing it entirely removes useful information"],developmentAreas:"The growth path here is reconnecting with team sentiment as information, not weakness. A nagging sense that morale is off is data your analytical process hasn't caught up to yet, and it deserves a seat at the table.",relationships:"Your team may read you as composed but hard to reach. Your investment in their growth is often real but doesn't reliably surface where they can feel it, which can leave them guessing where they stand.",work:"You're a strong asset managing through crisis, ambiguity, or any high-stakes execution challenge. Team emotion that goes unprocessed under your management doesn't disappear \u2014 it resurfaces as attrition or a blow-up that seems to come from nowhere.",workingStyleTips:["Schedule genuine unstructured time with your team \u2014 connection without an agenda builds trust pure competence doesn't.","When giving feedback, add one sentence about impact or feeling, not just facts and outcomes.","Before a high-stakes team call, check your own physical stress signals as a real input."],handlingDifficulty:"You handle team difficulty by controlling what you can and analyzing through the rest, which makes you genuinely steady in a crisis. The cost shows up in your team afterward \u2014 unprocessed tension resurfaces as disengagement or a sudden resignation that blindsides you.",leadershipImpact:"Your team likely respects your competence and composure under pressure, but may not experience you as approachable. The specific risk: problems get hidden from you longer than they should, because your team senses you'd rather have the fix than the feeling.",cultureFitPrompt:"If your organization is shifting toward a more people-centered leadership model, your command-and-control default may be increasingly out of step \u2014 worth an honest look at whether your style is evolving with the culture or holding steady against it.",roadmap:[{area:"Treating Team Morale Signals as Information",insight:"A nagging sense that something's off with your team is data your analytical mind hasn't caught up to yet \u2014 not a distraction from the \u201Creal\u201D work.",steps:["Before a high-stakes team call, check in on your own physical state as a real input.","When you notice a team stress signal, pause and name what might be going on before acting.","Keep a simple log of morale signals and what they later turned out to mean."]},{area:"Making Care Visible to Your Team",insight:"Your investment in your team is often genuine but doesn't reliably reach them, which leaves them guessing where they stand.",steps:["Schedule genuine unstructured time with your team, with no agenda.","Say the caring thing out loud instead of assuming actions speak for themselves.","Ask directly what your team wishes you expressed more often \u2014 then do it."]},{area:"Preventing the Delayed Cost of an Unprocessed Team",insight:"Team emotion that never gets processed doesn't vanish \u2014 it resurfaces as disengagement, attrition, or a blow-up that seems to come from nowhere.",steps:["Build a small, regular check-in practice with your team beyond status updates.","Ask one open, non-metric question in every 1:1: how are you actually doing?","Notice patterns: does attrition or disengagement spike after specific kinds of unprocessed situations?"]},{area:"Giving Your Read on People a Real Vote",insight:"Dismissing a gut read on a team risk entirely removes a genuine source of information your analytical process doesn't have access to.",steps:["Before dismissing a read on someone, ask what evidence would need to exist for you to take it seriously.","Write down instincts about people you overrode and revisit whether they turned out to be right.","Treat a strong, repeated read on a team risk as equivalent in weight to a moderate amount of data."]}],growth:["Build in unstructured time with your team, with no agenda or problem to solve.","When you notice a physical stress signal, pause and name what you're feeling before doing anything else.","Ask your team what they wish you expressed more often, and take it seriously.","Once a day, name one feeling about work in one word, without analyzing why.","Before dismissing a read on a team risk, ask what you'd need to see to take it seriously."]}],zp={DM:{whyItMatters:"How you make team-affecting decisions shapes your team's trust in your judgment and your own credibility as a leader over time.",high:{read:"Decisions about your team come from a felt sense of rightness first, with data used to sanity-check rather than lead.",tip:"Keep trusting your read on people and situations, but add a deliberate data check before resourcing or org-structure decisions."},mid:{read:"You draw on both gut feeling and data fairly evenly when deciding for your team.",tip:"Notice which mode you default to under deadline pressure \u2014 that's usually your true default."},low:{read:"You won't act on a team decision until the data checks out, even when it's really a people-read call.",tip:"For your next people-related call, decide on read first, then check it against the data second."}},RC:{whyItMatters:"Team trust is the currency that makes everything else \u2014 delegation, honest feedback, retention \u2014 possible.",high:{read:"You extend trust and autonomy based on how someone makes you feel about their reliability.",tip:"Keep trusting your read, but build one evidence check before extending major autonomy to a new team member."},mid:{read:"You balance gut trust with a track record when deciding how much autonomy to give.",tip:"Notice if you extend trust faster to people similar to you \u2014 worth checking for bias."},low:{read:"You evaluate your team mainly by measurable output, keeping emotional distance.",tip:"Pick one team member this month and have a real, non-agenda conversation \u2014 practice connection without evaluating."}},EA:{whyItMatters:"Your own emotional state leaks into every interaction with your team, whether you notice it or not.",high:{read:"You notice your own frustration or stress in the moment rather than pushing it aside during a busy day.",tip:"Keep naming it, and start sharing an appropriately calibrated version with your team \u2014 modeling awareness helps them too."},mid:{read:"You notice your reactions to workplace setbacks sometimes, though busy weeks can bury them.",tip:"Build a 2-minute end-of-day check-in: what did I actually feel today, no analysis required."},low:{read:"You intellectualize your reactions to workplace setbacks rather than actually feeling them.",tip:"Before your next 1:1, pause and name what you're actually feeling walking in."}},CN:{whyItMatters:"How you handle disagreement and hard conversations determines whether your team trusts you to be fair.",high:{read:"You prioritize understanding how someone feels before being right in a disagreement.",tip:"Keep prioritizing repair, but make sure necessary hard conversations aren't being delayed to preserve harmony."},mid:{read:"You can hold your ground or prioritize the relationship depending on the stakes.",tip:"Notice your pattern with specific team members \u2014 do you go easier on some than others?"},low:{read:"Being right tends to outweigh team morale once a disagreement escalates.",tip:"In your next hard conversation, ask what the other person needs to feel heard before making your case."}},TI:{whyItMatters:"Your gut read on people \u2014 candidates, risks, team dynamics \u2014 is pattern recognition built from experience.",high:{read:"You trust your read on a hire or a risk, even without full justification on paper.",tip:"Keep honoring your read, and log outcomes to sharpen your calibration over time."},mid:{read:"You weigh gut read alongside data, giving neither automatic priority.",tip:"Notice when you override your read \u2014 is there a pattern to when you don't trust it?"},low:{read:"You trust the spreadsheet over the hunch, even when the hunch about a person was right before.",tip:"Next time a read on someone shows up, write it down before dismissing it \u2014 check back later."}},EC:{whyItMatters:"Empathy is what makes people feel like more than a line on your org chart.",high:{read:"A direct report's stress genuinely affects you, not just registers as a fact to manage.",tip:"Keep letting it in, and build recovery time so it doesn't tip into carrying your whole team's stress."},mid:{read:"You access empathy for your team, though it takes more effort for some people than others.",tip:"Notice who's easiest to empathize with, and extend that same effort to people less like you."},low:{read:"You understand your team's struggles intellectually more than you feel them.",tip:"In your next 1:1, resist problem-solving for the first two minutes \u2014 just reflect what they're feeling."}},AE:{whyItMatters:"The gap between how you actually feel and the \u201Cmanager voice\u201D you perform costs you energy daily, and your team usually senses it.",high:{read:"You lead in a way that's true to how you feel, even when it's not the safe corporate answer.",tip:"Keep being real, and notice if there's a specific context \u2014 board updates, skip-levels \u2014 where you still perform."},mid:{read:"You're authentic in some management contexts, more guarded in others.",tip:"Pick your most guarded context and experiment with one honest disclosure."},low:{read:"You manage what you reveal to control how you're perceived as a leader.",tip:"Practice one small act of visible authenticity a week with your team."}},SP:{whyItMatters:"How you handle deadline pressure sets the emotional tone your whole team absorbs, whether you intend it to or not.",high:{read:"Under deadline pressure, you check in with how you feel and let that guide your next step.",tip:"Keep that instinct, and add one grounding practice so you're not relying on the team's mood to regulate you."},mid:{read:"Your stress response shifts depending on the type of pressure.",tip:"Notice what kind of deadline makes you shut down vs. reach out."},low:{read:"Under pressure, you shut down and retreat into solving alone.",tip:"Next high-pressure week, tell one peer you're having a hard time \u2014 no solving required."}},VP:{whyItMatters:"What you're actually optimizing for \u2014 team wellbeing or the number \u2014 quietly steers every close call you make as a manager.",high:{read:"Team wellbeing and meaning matter more to you than hitting every metric.",tip:"Keep protecting what matters, and sanity-check that this isn't avoiding necessary hard targets."},mid:{read:"You hold both team wellbeing and results as real priorities, weighing them situationally.",tip:"Notice which one wins when you're behind on a deadline \u2014 that's your truer default."},low:{read:"Results matter more to you than how the team felt getting there.",tip:"Before your next big call, ask what you'd choose if no one would ever see the metric."}},CS:{whyItMatters:"How you communicate as a manager determines whether feedback actually lands, or just gets heard and forgotten.",high:{read:"You communicate with warmth and honesty, even about underperformance.",tip:"Keep the directness, and check that warmth isn't softening necessary clarity."},mid:{read:"You adjust communication style depending on the person and stakes.",tip:"Notice which reports get your warmer register and which get the guarded one."},low:{read:"You default to facts and deliverables, and feelings rarely enter feedback.",tip:"In your next feedback conversation, add one sentence of feeling before the facts."}}},ul="hha_pending_unlock";function Ep(e,t,a){try{localStorage.setItem(ul,JSON.stringify({trackKey:e,answers:t,intake:a,savedAt:Date.now()}))}catch(n){}}function Yp(){try{let e=localStorage.getItem(ul);if(!e)return null;let t=JSON.parse(e);return Date.now()-t.savedAt>1440*60*1e3?(localStorage.removeItem(ul),null):t}catch(e){return null}}function xp(){try{localStorage.removeItem(ul)}catch(e){}}function $f(e){return e===null?null:e>=19?"high":e>=12?"mid":"low"}var em={high:{label:"Strength",color:Nt},mid:{label:"Balanced",color:M},low:{label:"Development Area",color:sa}},Bp=[{code:"DM",name:"Strategic Decision-Making",blurb:"How you make bets that shape the whole organization.",items:[{d:"H",t:"When making a major strategic bet, I trust my gut feeling even when I can't fully justify it to the board."},{d:"K",t:"I prefer to build the full business case and data model before committing to a major strategic bet."},{d:"H",t:"Some of my best strategic calls have come from what simply felt right, not from the deck."},{d:"K",t:"I feel uneasy committing to a strategic direction until the analysis is airtight."},{d:"K",t:"I trust a rigorous model over a hunch, even when the hunch about market timing has been right before."}]},{code:"RC",name:"Executive Trust & Relationships",blurb:"How you build trust with your leadership team, board, and investors.",items:[{d:"H",t:"I extend trust to my leadership team based on how they make me feel about their judgment, not just their track record."},{d:"K",t:"I evaluate my leadership team mainly by their measurable performance against targets."},{d:"H",t:"I stay emotionally open with my executive peers even when there's a risk of being let down."},{d:"K",t:"I keep emotional distance from my leadership team and the board to stay objective."},{d:"H",t:"I can tell when a leadership team member is struggling or losing confidence, even before it shows in the numbers."}]},{code:"EA",name:"Emotional Awareness in the C-Suite",blurb:"Whether you notice your own reactions under organizational pressure.",items:[{d:"H",t:"I notice and name my own anxiety or frustration during a board meeting, rather than pushing it aside."},{d:"K",t:"I intellectualize my reactions to organizational setbacks instead of actually feeling them."},{d:"H",t:"I let myself feel the weight of a hard call \u2014 a layoff, a pivot \u2014 fully rather than immediately moving to execution."},{d:"K",t:"I distract myself with the next task so I don't have to sit with how a difficult board conversation made me feel."},{d:"K",t:"I analyze my own stress logically rather than just noticing it in the moment."}]},{code:"CN",name:"High-Stakes Conflict & Negotiation",blurb:"What wins when the stakes are the whole company.",items:[{d:"H",t:"In a boardroom disagreement, I try to understand what's driving the other side before I try to win the point."},{d:"K",t:"In a high-stakes negotiation, I focus on leverage and being right over the relationship."},{d:"H",t:"I'm willing to say \u201CI was wrong\u201D in front of my leadership team if it rebuilds trust, even if I could defend my original call."},{d:"K",t:"I find it hard to let go of winning a boardroom argument, even when it costs organizational trust."},{d:"H",t:"I can stay relationally warm with a board member or investor even in the middle of a hard negotiation."}]},{code:"TI",name:"Trust & Intuition on Big Bets",blurb:"How much weight your instinct gets on irreversible calls.",items:[{d:"H",t:"I trust my read on a major partnership or acquisition, even when I can't fully justify it on paper."},{d:"K",t:"I only trust what's in the model \u2014 market data, financials \u2014 not my gut read on a deal."},{d:"H",t:"I've ignored my gut instinct on a major bet and regretted it."},{d:"K",t:"I dismiss my gut feeling about organizational risk as unreliable compared to hard data."},{d:"K",t:"I trust the financial model over the hunch, even when the hunch about a market shift turned out right before."}]},{code:"EC",name:"Empathy at Scale",blurb:"Whether the organization's experience lands with you, or stays abstract.",items:[{d:"H",t:"The organization's collective stress during a hard period genuinely affects me, not just registers as a metric."},{d:"K",t:"I understand what the organization is going through intellectually but rarely feel moved by it."},{d:"H",t:"I go out of my way to address organizational pain, even at a cost to strategic momentum."},{d:"K",t:"I keep my empathy for the organization in check so it doesn't interfere with hard strategic calls."},{d:"H",t:"Seeing the organization struggle or succeed genuinely moves me emotionally."}]},{code:"AE",name:"Authentic Executive Presence",blurb:"Whether the leader the org sees matches how you actually feel.",items:[{d:"H",t:"I lead in a way that's true to how I genuinely feel, even when it's not the polished executive answer."},{d:"K",t:"I often say what's expected of a CEO or executive rather than what I actually think."},{d:"H",t:"I'd rather be a genuine, occasionally imperfect leader than a flawlessly polished one."},{d:"K",t:"I carefully manage what I reveal to control how I'm perceived at the executive level."},{d:"K",t:"I keep my emotional expression tightly controlled in front of the board and the organization."}]},{code:"SP",name:"Pressure at the Top",blurb:"What you reach for when the whole company is watching.",items:[{d:"H",t:"Under company-wide crisis pressure, I check in with how I feel and let that guide my next step."},{d:"K",t:"Under company-wide crisis pressure, I shut down my emotions and focus purely on execution."},{d:"H",t:"When overwhelmed at the executive level, I reach out to a peer, coach, or mentor for support."},{d:"K",t:"When overwhelmed at the executive level, I withdraw and try to think my way out alone."},{d:"H",t:"I recover faster from a brutal quarter when I let myself feel and express it rather than suppress it."}]},{code:"VP",name:"What You're Building For",blurb:"What you're actually optimizing for at the highest level.",items:[{d:"H",t:"Organizational meaning and people matter more to me than hitting every board target."},{d:"K",t:"Results and shareholder value matter more to me than how the organization feels about how we got there."},{d:"H",t:"I'd choose a harder, more meaningful strategic direction over an easier, more lucrative one."},{d:"K",t:"I measure a good year mostly by the numbers, not the organization's experience getting there."},{d:"K",t:"I judge whether a strategic decision was \u201Cgood\u201D mainly by the outcome, not how it felt to make it."}]},{code:"CS",name:"Communication as an Executive",blurb:"How you talk to your leadership team, board, and the whole company.",items:[{d:"H",t:"I communicate with warmth and honesty with my leadership team, even about existential threats to the business."},{d:"K",t:"I communicate primarily with facts and strategy, keeping emotion out of company-wide messaging."},{d:"H",t:"I tell my leadership team how I feel about their work directly, rather than assuming they know."},{d:"K",t:"I find it easier to talk about strategy and numbers than about how the organization is doing emotionally."},{d:"H",t:"My leadership team would describe my communication style as heartfelt and genuine."}]}],Cp=[{key:"heart-centered",range:[200,250],name:"Heart-Centered \u2014 Purpose-Driven Leadership",color:Nt,teaser:"You lead the organization with feeling and instinct \u2014 people follow you because they believe in you, not just your title.",summary:"You lead primarily from the heart at the highest level. You trust your read on people, markets, and moments first, and use data and process to refine rather than override that read. This tends to show up as an executive who inspires real loyalty, not just compliance.",strengths:["Leadership team and board trust you and feel genuinely aligned with your vision","Strong read on organizational culture and morale, often ahead of engagement data","Comfortable rebuilding trust after a strategic misstep","Leads with values that don't bend under shareholder pressure"],watchouts:["Difficult organizational decisions (layoffs, pivots) can get delayed past the point of strategic necessity","Executive boundaries can blur \u2014 you may absorb the whole organization's stress as your own","High-stakes financial or M&A decisions may need more deliberate analysis than instinct alone provides"],developmentAreas:"Your growth edge at this level isn't caring more about the mission \u2014 it's building enough rigor around that care so it doesn't compromise the organization's survival. That means making the hard call on time even when it feels like a betrayal of your values, and protecting your own capacity so the weight of the whole organization doesn't become yours alone to carry.",relationships:"Your leadership team and board generally trust you fast, and they feel your investment in the mission without having to ask for it. The risk is discernment: you can extend trust to an underperforming executive past the point the evidence says you should act, and the cost compounds at this level.",work:"You thrive leading through vision, culture, and purpose \u2014 the organization feels genuinely inspired, not just directed. Purely financial or operational-first executive tasks will feel like a language you're capable of speaking but don't enjoy.",workingStyleTips:["Before protecting an underperforming executive \u201Ca little longer,\u201D name out loud what that delay is costing the rest of the leadership team and the organization.","Build one recurring checkpoint into major strategic decisions where you deliberately look only at the financial model, separate from how the vision feels.","Delegate or systematize the purely operational parts of the role \u2014 they drain you disproportionately."],handlingDifficulty:"When the organization hits a hard patch, you feel it fully and reach toward connection \u2014 town halls, direct conversations, visible presence. That keeps trust from cratering silently, which is real strength at this level. The risk is reacting to the organization's mood before you've had a moment to separate your own feeling from the strategic facts.",leadershipImpact:"Being led by you likely feels genuinely inspiring \u2014 people commit because they believe, not just because they're paid to. The flip side: your leadership team may sense when you're avoiding a hard call on a peer executive's performance, and over time that can quietly erode trust in your fairness at the top.",cultureFitPrompt:"If your board or investors reward fast, metrics-first decisions over mission and culture, you may find yourself working against the grain constantly \u2014 worth naming honestly whether that tension is making you a better check on short-termism, or slowly burning you out.",roadmap:[{area:"Delivering Hard Organizational Decisions On Time",insight:"Your instinct to protect people you believe in can quietly become a habit of delaying necessary organizational decisions until they're overdue.",steps:["Set a personal rule: performance or strategic concerns about a leader get raised within two weeks of noticing.","Before delaying a hard decision, name out loud what the delay costs the organization.","Practice a scripted opener for hard executive conversations so they start even when uncomfortable."]},{area:"Adding Rigor to High-Stakes Bets",insight:"On M&A, major capital allocation, or strategic pivots, speed on instinct can put the whole organization at risk.",steps:["For decisions above a certain impact threshold, build in a mandatory model review before deciding.","Write the decision out in plain language before acting on it.","Ask a trusted board member or peer CEO to sanity-check your biggest bets."]},{area:"Protecting Your Own Capacity",insight:"Absorbing the whole organization's stress as your own is generous, but it isn't sustainable at this scale.",steps:["Notice the bodily signal that shows up when you're taking on organizational stress as your own.","Build one recurring boundary and hold it, even during a crisis.","Work with a coach or peer group built specifically for this weight."]},{area:"Building Fair, Scalable Structure",insight:"Structure isn't the opposite of purpose-driven leadership \u2014 it's what makes your care fair and repeatable across an organization too large to touch personally.",steps:["Pick one recurring executive process (reviews, succession) and build a consistent
