 framework.","Delegate or systematize the operational parts of the role that drain you.","Revisit this roadmap in 3 months and note what stuck."]}],growth:["Before your next hard organizational decision, set a date within two weeks rather than waiting for the 'right moment.'","Practice saying 'let's look at the model on this one' as a complete, valid response.","Notice the difference between an executive who needs support and one who needs a consequence.","Keep a one-line weekly note of a moment you led with rigor instead of feeling.","Block real recovery time weekly that's just for you, not the organization."]},{key:"heart-leaning",range:[150,199],name:"Heart-Leaning \u2014 People-First, Integrated",color:Ta,teaser:"You lead with both head and heart \u2014 but when they disagree, your read on people and culture usually wins.",summary:"You lead with both head and heart at the executive level, but when they conflict, your read on people and organizational culture usually wins. You're capable of rigorous strategic analysis, but organizational morale and trust tend to carry more weight than pure metrics.",strengths:["Balanced strategic decisions that rarely ignore data or organizational sentiment","Genuine trust with your leadership team, with enough boundary to avoid being taken advantage of","Good instincts on people and culture, checked not overridden by data"],watchouts:["Under board pressure, the balance can tip further toward preserving harmony than the situation calls for","May avoid necessary hard financial conversations because they feel uncomfortable","Worth noticing when leniency with an underperforming executive is old pattern rather than present-moment judgment"],developmentAreas:"You're already integrating both sides more than most executives \u2014 the refinement now is consistency, especially under board or investor pressure when the pull toward keeping the peace gets strongest, which is exactly when a second, more analytical opinion matters most.",relationships:"Your relationships with your leadership team and board are warm and reciprocal, and you usually sense early when something's off \u2014 even if you don't always act on it immediately. They experience you as genuine, not a pushover.",work:"You're comfortable with both structured financial review and gut calls on people and culture, which makes you effective leading through ambiguity. Your risk is deferring to organizational sentiment in the specific calls that need more rigor \u2014 executive performance, M&A, resourcing.",workingStyleTips:["Name in advance the decisions (executive performance, M&A, major resourcing) where you'll always force a written, criteria-based pass before deciding.","When you notice you're avoiding a hard financial conversation because it feels uncomfortable, treat that discomfort as a signal to lean in.","Ask a trusted, more data-driven board member or peer to sanity-check your biggest calls."],handlingDifficulty:"You meet organizational difficulty by feeling it honestly first, then figuring out what to do \u2014 which generally builds trust. Where it goes sideways is under real board pressure, when a fear of conflict quietly takes the wheel disguised as \u201Creading the room.\u201D",leadershipImpact:"Your leadership team likely feels genuinely cared for and safe bringing you problems. The risk: your strongest executives may quietly notice when you let an underperforming peer coast too long, and start to wonder if the bar actually matters at the top.",cultureFitPrompt:"If your board runs on hard metrics and fast executive turnover, your people-first instinct may create real friction \u2014 worth asking whether that tension makes you a better check on the culture, or just makes the job harder.",roadmap:[{area:"Consistency Under Board Pressure",insight:"You integrate people and data well normally \u2014 the gap shows specifically when you're under board pressure and emotionally invested.",steps:["Pre-decide which decisions (executive performance, M&A) always get a written criteria pass, no exceptions.","Build a simple checklist you reach for automatically under board pressure.","Any people decision made while stressed gets revisited 24 hours later before it's final."]},{area:"Recognizing Conflict-Avoidance Disguised as Instinct",insight:"Under board pressure, a fear of confrontation can borrow the voice of \u201Creading the room.\u201D",steps:["Ask, in hard moments: is this what the organization needs, or my own discomfort with conflict?","Track weekly when you later realize avoidance was driving, not insight.","Loop in a board member specifically on executive performance calls."]},{area:"Doing the Hard Financial Review You'd Rather Skip",insight:"You can avoid a necessary hard conversation about an executive's numbers because it feels unkind, not because it's unnecessary.",steps:["Notice when 'they're navigating a lot right now' becomes a permanent excuse.","Ask a data-driven board member to sanity-check assessments before you finalize them.","Give yourself permission to be temporarily 'unkind' in service of organizational fairness."]},{area:"Calibrating Your Own Track Record on People Calls",insight:"You don't yet have an evidence-based sense of when your people-read is right and when it's wishful thinking.",steps:["Keep a light log: who you gave the benefit of the doubt to, and how it played out.","Review it quarterly, not just after a blow-up.","Use the pattern to recalibrate how much benefit-of-the-doubt you extend by default."]}],growth:["Before your next executive review, write the criteria-based case first, then check it against how you feel about the person.","Ask yourself whether avoiding a tough conversation is kindness, or your own discomfort.","Keep a short log of people calls where the data was right and your gut was wrong, and vice versa.","Once a month, revisit a people decision made under board pressure and ask what a calmer you would've done.","Practice stating the data-driven case out loud to a peer before your final call."]},{key:"head-leaning",range:[100,149],name:"Head-Leaning \u2014 Results-First, Integrated",color:Ma,teaser:"You lead with both head and heart \u2014 but logic usually wins the tie-break at the highest level.",summary:"You lead with both head and heart, but logic usually wins the tie-break. You value being right, being prepared, and defensible strategic decisions. Organizational sentiment is noticed, but filtered through data before you act on it.",strengths:["Clear-headed, well-reasoned strategic decisions, especially under board pressure","Reliability \u2014 your leadership team and board trust your judgment because it's consistent","Not easily swayed by a vocal minority or a bad quarter"],watchouts:["Executive relationships can read as transactional, or like you're managing rather than leading","A good instinct about a person or market may get overridden because it isn't provable in a board deck","Organizational frustration that goes unexpressed for too long tends to surface as executive attrition"],developmentAreas:"The work for you isn't becoming less rigorous \u2014 it's letting organizational sentiment count as a real input, not noise to manage around. That starts small: noticing the mood in the room without immediately looking for the metric that explains it away.",relationships:"Your leadership team and board generally experience you as competent and fair, but may work harder to feel close to you, since warmth gets filtered through your analytical process first. You show you care through consistency, not words.",work:"You're well-suited to leading through complexity and existential ambiguity, where being right matters more than being warm. The same wiring can make you slow to celebrate a major win or sit with organizational disappointment.",workingStyleTips:["In leadership team meetings, ask \u201Chow does this land across the organization\u201D as a standing question, not an afterthought.","When you dismiss a read on an executive or the market because you can't prove it yet, write it down and check back.","Build in real recovery time for your leadership team after high-output periods, not just for yourself."],handlingDifficulty:"Under organizational difficulty, you default to solving \u2014 quiet, analytical, focused on the strategic fix, which works for a lot of problems. What it doesn't do is process the organization's emotional residue, which tends to surface later as quiet disengagement or unexpected departures.",leadershipImpact:"Your leadership team trusts your judgment and feels safe under your consistency, but may not feel truly seen by you. Over time, your strongest executives may leave not because of bad leadership, but because they never felt like more than a strong performer to you.",cultureFitPrompt:"If your organization explicitly values a \u201Cpeople-first\u201D culture on paper, your results-first default may create a quiet mismatch worth naming \u2014 are you the counterbalance the culture needs, or out of step with it?",roadmap:[{area:"Letting Organizational Sentiment Count as Data",insight:"You treat organizational mood as noise to manage around rather than a legitimate input \u2014 even when it's accurate.",steps:["When you dismiss a read on culture because you can't prove it, write it down anyway and check back later.","Before finalizing a major decision, explicitly ask 'how does this land,' not just 'does this hold up.'","Practice treating a strong read on organizational mood as a hypothesis worth testing."]},{area:"Making Care Visible at the Top",insight:"People trust your judgment but may not feel close to you, because warmth doesn't reliably make it to the surface.",steps:["Add one sentence of impact or feeling to feedback you give executives, not just facts and outcomes.","Say the appreciative thing out loud instead of assuming it's understood.","Ask an executive what they wish you expressed more, and act on the answer."]},{area:"Processing Organizational Difficulty Instead of Just Solving It",insight:"Under difficulty, you solve and move on \u2014 the organization's emotional residue doesn't disappear, it resurfaces later as disengagement.",steps:["Name the organization's likely feeling out loud, even briefly, before moving to solutions.","After a hard quarter, ask the leadership team how it felt, not just whether targets were hit.","Build in real recovery time after high-output periods, not just after visible burnout."]},{area:"Recovering the Muscle of Noticing Culture",insight:"Noticing organizational sentiment is a skill like any other \u2014 under-used, it atrophies, and that's reversible with practice.",steps:["Once a week, make one small call purely on read, and notice what happens.","Sit with unresolved organizational tension for a few minutes without rushing to fix it.","Reflect an executive's feeling back to them before offering a solution, at least once a week."]}],growth:["Once a week, make one small leadership decision purely on how it feels.","When an executive shares a problem, try reflecting their feeling back before offering a solution.","Name your own reaction out loud in a leadership meeting at least once a week.","After a hard quarter, ask the leadership team how it felt, not just whether targets were hit.","Practice sitting with organizational tension for five minutes without rushing to fix it."]},{key:"head-dominant",range:[50,99],name:"Head-Dominant \u2014 Command-and-Control at Scale",color:sa,teaser:"Logic, control, and process are your default setting at the highest level \u2014 strong execution, sometimes distant.",summary:"You lead primarily from the head at the executive level. Logic, control, and process are your default mode, and emotional input from your leadership team and organization is often minimized or arrives late. This can look like strong execution from the outside, while the organization experiences distance.",strengths:["Composure and clarity in existential crisis or high-stakes situations","Objectivity \u2014 your strategic decisions are less prone to favoritism or reactivity","Strong follow-through once a strategic decision is made"],watchouts:["Executive and board relationships may feel one-sided or purely transactional, even with good intent","Suppressed frustration with the organization tends to leak out as tension or a sudden sharp reaction","A read on organizational or market risk is real data \u2014 dismissing it entirely removes useful information"],developmentAreas:"The growth path here is reconnecting with organizational sentiment as information, not weakness. A nagging sense that culture or morale is off is data your analytical process hasn't caught up to yet, and it deserves a seat at the table.",relationships:"Your leadership team and board may read you as composed but hard to reach. Your investment in the organization's growth is often real but doesn't reliably surface where they can feel it, which can leave them guessing where they stand.",work:"You're a strong asset leading through crisis, ambiguity, or any high-stakes execution challenge. Organizational emotion that goes unprocessed under your leadership doesn't disappear \u2014 it resurfaces as executive attrition or a culture problem that seems to come from nowhere.",workingStyleTips:["Schedule genuine unstructured time with your leadership team \u2014 connection without an agenda builds trust pure competence doesn't.","When giving feedback to executives, add one sentence about impact or feeling, not just facts and outcomes.","Before a high-stakes board call, check your own physical stress signals as a real input."],handlingDifficulty:"You handle organizational difficulty by controlling what you can and analyzing through the rest, which makes you genuinely steady in a crisis. The cost shows up in your organization afterward \u2014 unprocessed tension resurfaces as disengagement or a sudden executive departure that blindsides you.",leadershipImpact:"Your leadership team likely respects your competence and composure under pressure, but may not experience you as approachable. The specific risk: problems get hidden from you longer than they should, because your team senses you'd rather have the fix than the feeling.",cultureFitPrompt:"If your organization is shifting toward a more people-centered leadership model, your command-and-control default may be increasingly out of step \u2014 worth an honest look at whether your style is evolving with the culture or holding steady against it.",roadmap:[{area:"Treating Organizational Signals as Information",insight:"A nagging sense that something's off in the culture is data your analytical mind hasn't caught up to yet.",steps:["Before a high-stakes board call, check in on your own physical state as a real input.","When you notice an organizational stress signal, pause and name what might be going on before acting.","Keep a simple log of culture signals and what they later turned out to mean."]},{area:"Making Care Visible at the Top",insight:"Your investment in the organization is often genuine but doesn't reliably reach people, which leaves them guessing where they stand.",steps:["Schedule genuine unstructured time with your leadership team, with no agenda.","Say the caring thing out loud instead of assuming actions speak for themselves.","Ask directly what your leadership team wishes you expressed more often \u2014 then do it."]},{area:"Preventing the Delayed Cost of an Unprocessed Organization",insight:"Organizational emotion that never gets processed doesn't vanish \u2014 it resurfaces as attrition or a culture problem that seems to come from nowhere.",steps:["Build a small, regular check-in practice with your leadership team beyond metrics.","Ask one open, non-metric question in every 1:1 with a direct report: how are you actually doing?","Notice patterns: does attrition spike after specific kinds of unprocessed situations?"]},{area:"Giving Your Read on People and Markets a Real Vote",insight:"Dismissing a gut read on an organizational or market risk entirely removes a genuine source of information.",steps:["Before dismissing a read, ask what evidence would need to exist for you to take it seriously.","Write down instincts about people or markets you overrode and revisit whether they were right.","Treat a strong, repeated read as equivalent in weight to a moderate amount of data."]}],growth:["Build in unstructured time with your leadership team, with no agenda or problem to solve.","When you notice a physical stress signal, pause and name what you're feeling before doing anything else.","Ask your leadership team what they wish you expressed more often, and take it seriously.","Once a day, name one feeling about the organization in one word, without analyzing why.","Before dismissing a read on an organizational risk, ask what you'd need to see to take it seriously."]}],kp={DM:{whyItMatters:"How you make strategic bets shapes the trajectory of the entire organization and your credibility with the board over time.",high:{read:"Strategic bets come from a felt sense of rightness first, with the model used to sanity-check rather than lead.",tip:"Keep trusting your read, but add a deliberate model review before irreversible or highly capital-intensive bets."},mid:{read:"You draw on both instinct and data fairly evenly when making strategic calls.",tip:"Notice which mode you default to under board pressure \u2014 that's usually your true default."},low:{read:"You won't commit to a strategic direction until the model is airtight, even when it's really a market-timing read.",tip:"For your next major bet, decide on instinct first, then check it against the model second."}},RC:{whyItMatters:"Trust at the top is the currency that makes delegation, honest dissent, and retention of your best executives possible.",high:{read:"You extend trust to your leadership team based on how they make you feel about their judgment.",tip:"Keep trusting your read, but build one evidence check before extending major autonomy to a new executive."},mid:{read:"You balance instinct with track record when deciding how much autonomy to extend.",tip:"Notice if you extend trust faster to executives similar to you \u2014 worth checking for bias."},low:{read:"You evaluate your leadership team mainly by measurable performance, keeping emotional distance.",tip:"Pick one executive relationship this month and have a real, non-agenda conversation."}},EA:{whyItMatters:"Your emotional state sets the tone the entire organization absorbs, whether you intend it to or not.",high:{read:"You notice your own anxiety or frustration during high-stakes moments rather than pushing it aside.",tip:"Keep naming it, and model appropriately calibrated awareness for your leadership team."},mid:{read:"You notice your reactions to organizational setbacks sometimes, though crisis periods can bury them.",tip:"Build a brief end-of-day check-in, especially during high-stakes stretches."},low:{read:"You intellectualize your reactions to organizational setbacks rather than actually feeling them.",tip:"Before your next board meeting, pause and name what you're actually feeling walking in."}},CN:{whyItMatters:"How you handle boardroom conflict and high-stakes negotiation determines whether people trust you to be fair when it matters most.",high:{read:"You prioritize understanding what's driving the other side before winning the point.",tip:"Keep prioritizing the relationship, but make sure necessary hard calls aren't being delayed to preserve harmony."},mid:{read:"You can hold your ground or prioritize the relationship depending on the stakes.",tip:"Notice your pattern with specific board members or executives \u2014 do you go easier on some?"},low:{read:"Winning the point tends to outweigh the relationship once a boardroom disagreement escalates.",tip:"In your next hard negotiation, ask what the other side needs to feel heard before making your case."}},TI:{whyItMatters:"Your instinct on major bets \u2014 deals, markets, people \u2014 is pattern recognition built from experience that data alone can't replicate.",high:{read:"You trust your read on a major deal or bet, even without full justification on paper.",tip:"Keep honoring your read, and log outcomes to sharpen your calibration."},mid:{read:"You weigh instinct alongside data, giving neither automatic priority.",tip:"Notice when you override your read \u2014 is there a pattern to when you don't trust it?"},low:{read:"You trust the model over the instinct, even when the instinct about a market or person was right before.",tip:"Next time a strong read shows up, write it down before dismissing it."}},EC:{whyItMatters:"Empathy at scale is what keeps the organization feeling like a mission people believe in, not just a headcount number.",high:{read:"The organization's collective stress genuinely affects you, not just registers as a metric.",tip:"Keep letting it in, and build recovery time so it doesn't tip into carrying the whole organization's stress."},mid:{read:"You access empathy for the organization, though it takes more effort in some situations.",tip:"Notice which parts of the organization are easiest to empathize with, and extend that effort further."},low:{read:"You understand the organization's struggles intellectually more than you feel them.",tip:"In your next skip-level or town hall, resist problem-solving first \u2014 just listen."}},AE:{whyItMatters:"The gap between how you actually feel and the \u201Cexecutive voice\u201D you perform costs you energy daily, and your organization usually senses it.",high:{read:"You lead in a way that's true to how you feel, even when it's not the polished executive answer.",tip:"Keep being real, and notice if there's a specific context \u2014 investor calls, board decks \u2014 where you still perform."},mid:{read:"You're authentic in some executive contexts, more guarded in others.",tip:"Pick your most guarded context and experiment with one honest disclosure."},low:{read:"You manage what you reveal to control how you're perceived at the top.",tip:"Practice one small act of visible authenticity a week with your leadership team."}},SP:{whyItMatters:"How you handle company-wide crisis pressure sets the emotional ceiling for how the whole organization copes.",high:{read:"Under crisis pressure, you check in with how you feel and let that guide your next step.",tip:"Keep that instinct, and add one grounding practice so you're not relying on the room's mood to regulate you."},mid:{read:"Your stress response shifts depending on the type of crisis.",tip:"Notice what kind of pressure makes you shut down vs. reach out."},low:{read:"Under pressure, you shut down and retreat into solving alone.",tip:"Next high-pressure stretch, tell one peer or coach you're having a hard time."}},VP:{whyItMatters:"What you're actually optimizing for at the top \u2014 mission or the number \u2014 quietly steers every close strategic call.",high:{read:"Organizational meaning and people matter more to you than hitting every board target.",tip:"Keep protecting what matters, and sanity-check that this isn't avoiding necessary hard targets."},mid:{read:"You hold both mission and results as real priorities, weighing them situationally.",tip:"Notice which one wins when you're behind on a board commitment \u2014 that's your truer default."},low:{read:"Results matter more to you than how the organization felt getting there.",tip:"Before your next big call, ask what you'd choose if no board member would ever see the metric."}},CS:{whyItMatters:"How you communicate at the top determines whether the whole organization actually trusts what you say, or just hears it.",high:{read:"You communicate with warmth and honesty, even about existential threats to the business.",tip:"Keep the directness, and check that warmth isn't softening necessary clarity."},mid:{read:"You adjust communication style depending on the audience and stakes.",tip:"Notice which parts of the organization get your warmer register and which get the guarded one."},low:{read:"You default to facts and strategy, and feelings rarely enter company-wide communication.",tip:"In your next all-hands, add one sentence of feeling before the facts."}}},Tp=[{code:"DM",name:"Decision-Making as You Start Out",blurb:"How you make calls when you're still learning the ropes.",items:[{d:"H",t:"When making a call at my new job, I trust my gut feeling even when I don't have much context yet."},{d:"K",t:"I prefer to ask around and gather information before making any decision at my new job."},{d:"H",t:"Some of my best early decisions have come from what simply felt right, not from asking everyone first."},{d:"K",t:"I feel uneasy making a call at work until I've checked with someone more experienced."},{d:"K",t:"I trust what my manager or a mentor says over my own instinct, even when my gut has been right before."}]},{code:"RC",name:"Building Relationships at a New Job",blurb:"How you build trust with new colleagues and your manager.",items:[{d:"H",t:"I choose who to trust among my new colleagues based on how they make me feel, not just their title."},{d:"K",t:"I evaluate new colleagues mainly by how useful they seem to my career progress."},{d:"H",t:"I stay open and warm with new coworkers even though I don't know them well yet."},{d:"K",t:"I keep my distance from new colleagues until I'm sure I can trust them."},{d:"H",t:"I can tell when a colleague genuinely wants to help me, even without them saying it directly."}]},{code:"EA",name:"Emotional Awareness in a New Environment",blurb:"Whether you notice your own reactions while still finding your footing.",items:[{d:"H",t:"I notice and name my own nervousness or excitement on a new project, rather than pushing it aside."},{d:"K",t:"I intellectualize my reactions to a rough first few weeks instead of actually feeling them."},{d:"H",t:"I let myself feel disappointed after a mistake fully rather than immediately jumping to fix it."},{d:"K",t:"I distract myself with more tasks so I don't have to sit with how a hard day at my new job made me feel."},{d:"K",t:"I analyze my own stress about fitting in logically rather than just noticing it."}]},{code:"CN",name:"Handling Feedback & Early Conflict",blurb:"What wins when you're new and unsure of the unwritten rules.",items:[{d:"H",t:"When I get critical feedback, I try to understand where it's coming from before reacting."},{d:"K",t:"When I get critical feedback, I focus on defending my work over understanding the feedback."},{d:"H",t:"I'm willing to admit I was wrong to a new colleague if it helps build trust, even early on."},{d:"K",t:"I find it hard to let go of being right in a disagreement, even as the new person."},{d:"H",t:"I can stay warm toward a colleague even after a tense disagreement in my first few months."}]},{code:"TI",name:"Trust & Intuition as a Newcomer",blurb:"How much weight your instinct gets when you don't have context yet.",items:[{d:"H",t:"I trust my read on a new colleague or manager, even when I don't have much evidence yet."},{d:"K",t:"I only trust what I've been explicitly told about someone, not my gut read."},{d:"H",t:"I've ignored my gut instinct about a workplace situation and regretted it."},{d:"K",t:"I dismiss my gut feeling about my new job as unreliable since I don't have context yet."},{d:"K",t:"I trust what more experienced coworkers say over my own read, even when my read has been right before."}]},{code:"EC",name:"Empathy for Your New Team",blurb:"Whether your new colleagues' experience lands with you.",items:[{d:"H",t:"A new colleague's stress or frustration genuinely affects me, even though I just met them."},{d:"K",t:"I understand what my new colleagues are going through intellectually but rarely feel moved by it."},{d:"H",t:"I go out of my way to help a struggling new teammate, even though I'm new myself."},{d:"K",t:"I keep my empathy in check at work so it doesn't get in the way of learning my job."},{d:"H",t:"Seeing a new colleague struggle or succeed genuinely moves me emotionally."}]},{code:"AE",name:"Authentic Presence as the New Person",blurb:"Whether you show up as yourself, or perform who you think they want.",items:[{d:"H",t:"I show up as myself at my new job, even when it's not the safest first-impression move."},{d:"K",t:"I often say what I think a new employee is supposed to say rather than what I actually think."},{d:"H",t:"I'd rather be a genuine, occasionally awkward new hire than a perfectly polished one."},{d:"K",t:"I carefully manage what I reveal about myself to control my first impression."},{d:"K",t:"I keep my emotional expression tightly controlled while I'm still new."}]},{code:"SP",name:"Pressure & Imposter Moments",blurb:"What you reach for when you feel out of your depth.",items:[{d:"H",t:"When I feel out of my depth, I check in with how I feel and let that guide my next step."},{d:"K",t:"When I feel out of my depth, I shut down my emotions and just push through."},{d:"H",t:"When overwhelmed as the new person, I reach out to a colleague or mentor for support."},{d:"K",t:"When overwhelmed as the new person, I withdraw and try to figure it out alone."},{d:"H",t:"I recover faster from a hard week when I let myself feel and express it rather than suppress it."}]},{code:"VP",name:"What You're Optimizing For Early On",blurb:"What actually drives your choices as you build your career.",items:[{d:"H",t:"Learning and genuine connection matter more to me right now than looking impressive fast."},{d:"K",t:"Looking capable and being right matter more to me than how the process feels."},{d:"H",t:"I'd rather take on meaningful work slowly than easy, high-visibility work fast."},{d:"K",t:"I measure my early success mostly by output, not how the experience felt."},{d:"K",t:"I judge whether I'm doing well mainly by results, not how it felt to get there."}]},{code:"CS",name:"Communication as a New Team Member",blurb:"How you talk to your manager and new colleagues.",items:[{d:"H",t:"I communicate with warmth and honesty with my manager, even about things I don't understand yet."},{d:"K",t:"I communicate primarily with facts and questions, keeping how I feel out of it."},{d:"H",t:"I tell my manager or teammates how I feel about the work directly, rather than assuming they know."},{d:"K",t:"I find it easier to ask about tasks and deadlines than to talk about how I'm doing."},{d:"H",t:"My new colleagues would describe my communication style as heartfelt and genuine."}]}],Mp=[{key:"heart-centered",range:[200,250],name:"Heart-Centered \u2014 Genuine From Day One",color:Nt,teaser:"You lead with feeling and instinct even as the new person \u2014 people warm to you fast because you're real.",summary:"You operate primarily from the heart, even this early in your career. You trust your read on people and situations first, and use guidance and process to refine rather than override that read. This tends to show up as a new hire people genuinely warm to, not just tolerate.",strengths:["Colleagues and your manager trust you quickly and feel your genuine investment","Strong read on team dynamics, often ahead of what's said out loud","Comfortable admitting mistakes and repairing trust early","Shows up as authentically yourself rather than performing a \u201Cnew hire\u201D persona"],watchouts:["Difficult feedback conversations can get avoided past the point of learning from them","Boundaries can blur \u2014 you may take on too much to be liked or helpful","High-stakes early decisions (which project to take, who to trust) may need more deliberate analysis"],developmentAreas:"Your growth edge this early isn't caring more about fitting in \u2014 it's building enough structure around that care so it doesn't work against your own learning curve. That means asking for hard feedback on time even when it feels uncomfortable, and protecting your own energy so being liked doesn't become more important than actually growing.",relationships:"You bond with new colleagues quickly, and they feel your genuine interest without having to ask for it. The risk is discernment: you can extend trust to a colleague or take on a task before you've had time to evaluate whether it's actually good for you.",work:"You thrive in roles where relationship and culture matter \u2014 people notice and remember you. Purely technical or process-heavy onboarding tasks will feel like a language you're capable of speaking but don't enjoy.",workingStyleTips:["Before saying yes to extra work to be helpful, name out loud what saying yes will cost your own learning time.","Build one recurring checkpoint into big early decisions where you deliberately look only at the facts, separate from how it feels.","Ask for feedback on a schedule, not just when it's offered \u2014 waiting can let small issues become bigger ones."],handlingDifficulty:"When your first few months get hard, you feel it fully and reach toward connection \u2014 asking questions, checking in with people, being visible about the struggle. That keeps small problems from becoming isolating ones, which is real strength this early. The risk is reacting to how a moment feels before you've had a chance to separate your own feeling from what's actually happening.",leadershipImpact:"You're likely making a strong first impression \u2014 people remember you as warm and genuine, not just competent. The flip side: your manager or team may sense when you're avoiding asking a hard question because you don't want to seem unprepared, and that avoidance can slow your own ramp-up.",cultureFitPrompt:"If your organization's culture rewards fast, heads-down execution over relationship-building, you may feel like you're working against the grain early on \u2014 worth naming honestly whether that's a values mismatch worth watching, or just the normal discomfort of being new.",roadmap:[{area:"Asking for Hard Feedback Early",insight:"Your instinct to keep things warm can quietly become a habit of avoiding the feedback that would actually accelerate your growth.",steps:["Ask your manager for specific, critical feedback on a fixed schedule, not just when it's offered.","Before avoiding a hard question, name out loud what the delay costs your own learning.","Practice a simple opener for asking for feedback so it becomes routine, not a big moment."]},{area:"Adding Structure to Big Early Decisions",insight:"On which projects to take, who to align with, or how to spend your ramp-up time, speed on instinct can cost you months of misdirected effort.",steps:["For decisions with real career impact, build in a deliberate pros/cons pass before committing.","Write the decision out in plain language before acting on it.","Ask a mentor or more experienced colleague to sanity-check your biggest early calls."]},{area:"Protecting Your Own Learning Capacity",insight:"Saying yes to everything to be liked is generous, but it isn't sustainable, and it isn't actually what will make you good at your job.",steps:["Notice the bodily signal that shows up when you're about to over-commit to be helpful.","Build one recurring boundary \u2014 protected focus time \u2014 and hold it.","Ask yourself whether saying yes serves your learning, or just your desire to be liked."]},{area:"Building Genuine Relationships Without Overextending",insight:"Connection doesn't require self-sacrifice \u2014 the best relationships you'll build here can coexist with real boundaries.",steps:["Pick one or two colleagues to invest in deeply rather than trying to befriend everyone at once.","Notice which relationships give energy back, and which only take it.","Revisit this roadmap in 3 months and note what actually stuck."]}],growth:["Before your next feedback conversation, write down one question you're afraid to ask, and ask it anyway.","Practice saying 'let me think about that and get back to you' as a complete, valid response.","Notice the difference between a task that helps you grow and one that just makes you liked.","Keep a one-line weekly note of a moment you led with process instead of feeling.","Block time weekly that's just for your own learning, not for helping others."]},{key:"heart-leaning",range:[150,199],name:"Heart-Leaning \u2014 Warm, Still Learning to Trust the Process",color:Ta,teaser:"You use both head and heart as you find your footing \u2014 but when they disagree, your read on people usually wins.",summary:"You use both head and heart this early in your career, but when they conflict, your read on people usually wins. You're capable of careful, methodical learning, but connection and how something feels tend to carry more weight than pure process.",strengths:["Balanced early decisions that rarely ignore facts or how things feel","Genuine relationships with new colleagues, with enough self-protection to avoid being taken advantage of","Good instincts about people and situations, checked not overridden by process"],watchouts:["Under pressure to fit in, the balance can tip further toward people-pleasing than the situation calls for","May avoid asking necessary 'obvious' questions because they feel embarrassing","Worth noticing when going along with something is genuine agreement or just wanting to belong"],developmentAreas:"You're already integrating both sides more than most new hires \u2014 the refinement now is consistency, especially under the pressure to seem like you've got it figured out, which is exactly when a second, more analytical check matters most.",relationships:"Your relationships with new colleagues are warm and reciprocal, and you usually sense early when something's off with the team dynamic \u2014 even if you don't always act on it right away. People experience you as genuine, not performative.",work:"You're comfortable with both structured onboarding and reading the room, which makes you effective in ambiguous early situations. Your risk is deferring to how something feels in the specific moments that need more rigor \u2014 understanding a process correctly, clarifying an unclear task.",workingStyleTips:["Name in advance the situations (unclear instructions, technical processes) where you'll always ask a clarifying question, no exceptions.","When you notice you're avoiding a question because it feels embarrassing, treat that discomfort as a signal to ask anyway.","Find one more experienced colleague to sanity-check your understanding of anything ambiguous."],handlingDifficulty:"You meet early difficulty by feeling it honestly first, then figuring out what to do \u2014 which generally builds trust. Where it goes sideways is under real pressure to seem competent, when a fear of looking unprepared quietly takes the wheel disguised as \u201CI'll figure it out myself.\u201D",leadershipImpact:"Your team and manager likely feel genuinely warmly toward you. The risk: they may not realize when you're actually confused or struggling, because you default to seeming like you're keeping up rather than asking for help.",cultureFitPrompt:"If your organization runs on fast, independent execution with little hand-holding, your people-first instinct to ask and connect may create friction worth noticing \u2014 is it slowing you down, or actually helping you learn faster than pure independence would?",roadmap:[{area:"Asking the \u2018Obvious\u2019 Question Anyway",insight:"The questions that feel most embarrassing to ask are often the ones that would save you the most time.",steps:["Give yourself permission to ask any question once without judging it as 'obvious.'","Before staying quiet, ask yourself: would a senior person actually think less of me for asking this?","Keep a running list of questions and ask them in batches if one-off asking feels harder."]},{area:"Recognizing Fear of Looking Unprepared Disguised as Independence",insight:"Under pressure to seem competent, avoiding help can masquerade as self-sufficiency.",steps:["Ask, in hard moments: am I avoiding help because I don't need it, or because I'm afraid to ask?","Track weekly when you later realize you struggled longer than necessary alone.","Loop in your manager specifically when you notice this pattern."]},{area:"Clarifying Instead of Assuming",insight:"Assuming you understand an unclear instruction to avoid seeming behind can cost far more time than asking would have.",steps:["Restate instructions back in your own words before starting any ambiguous task.","Ask a more experienced colleague to sanity-check your understanding before you're deep into the work.","Give yourself permission to be 'behind' in service of actually getting it right."]},{area:"Calibrating When Your Read on a Situation Is Right",insight:"You don't yet have a track record of when your early instincts about people or situations are accurate.",steps:["Keep a light log: what you read about a situation, and how it played out.","Review it monthly, not just after something goes wrong.","Use the pattern to build confidence in your own read over time."]}],growth:["Before assuming you understand an instruction, restate it back and confirm.","Ask yourself whether staying quiet is confidence, or fear of looking unprepared.","Keep a short log of moments your gut read on a situation was right, and where it wasn't.","Once a month, revisit a moment you struggled alone and ask what asking for help would have changed.","Practice asking one 'obvious' question a week on purpose."]},{key:"head-leaning",range:[100,149],name:"Head-Leaning \u2014 Careful, Still Warming Up",color:Ma,teaser:"You use both head and heart as you start out \u2014 but logic usually wins the tie-break.",summary:"You use both head and heart early in your career, but logic usually wins the tie-break. You value being prepared, being right, and understanding the process fully. Team sentiment is noticed, but filtered through analysis before you act on it.",strengths:["Clear-headed, well-prepared work, especially on technical or process-heavy tasks","Reliability \u2014 colleagues trust your output because it's consistent","Not easily rattled by a chaotic first few weeks"],watchouts:["New relationships can read as reserved, or like you're keeping people at arm's length while you get oriented","A good instinct about a colleague or situation may get dismissed because it isn't provable yet","Early frustration that goes unexpressed for too long can surface as disengagement before you've even settled in"],developmentAreas:"The work for you isn't becoming less careful \u2014 it's letting the social and emotional side of a new job count as real information, not noise to get through. That starts small: noticing team mood without immediately looking for the process explanation.",relationships:"Colleagues generally experience you as competent and reliable, but may take longer to feel close to you, since warmth gets filtered through your analytical process first. You show you're settling in through consistency, not small talk.",work:"You're well-suited to roles with clear processes and technical depth, where being right matters more than being warm early on. The same wiring can make you slow to celebrate an early win or connect over a hard week.",workingStyleTips:["In 1:1s with your manager, ask 'how am I actually doing socially, not just on output' as a standing question.","When you dismiss a read on a colleague because you can't prove it yet, write it down and check back.","Say yes to one purely social team moment a week, even if it feels unproductive."],handlingDifficulty:"Under early difficulty, you default to solving \u2014 quiet, analytical, focused on figuring it out, which works for a lot of onboarding problems. What it doesn't do is process the emotional residue of being new, which tends to surface later as quiet disengagement.",leadershipImpact:"Your manager and team trust your output, but may not feel like they know you yet. Over time, this can mean you're seen as competent but replaceable rather than someone people are invested in keeping.",cultureFitPrompt:"If your organization explicitly prizes \u201Cculture fit\u201D and relationship-building in its early stages, your results-first default may create a quiet mismatch worth naming \u2014 are you settling in on your own terms, or missing something the culture actually rewards?",roadmap:[{area:"Letting Social Signals Count as Data",insight:"You treat team mood and social cues as noise to get through rather than a legitimate input \u2014 even when they're accurate.",steps:["When you dismiss a social read because you can't prove it, write it down anyway and check back later.","Before finalizing your sense of a situation, explicitly ask 'how does this feel,' not just 'does this make sense.'","Practice treating a strong social read as a hypothesis worth testing."]},{area:"Making Your Interest in People Visible",insight:"People can't feel your investment in them if it never surfaces \u2014 warmth has to be expressed to register.",steps:["Say one appreciative thing to a colleague out loud each week, instead of assuming it's understood.","Ask a colleague a genuine, non-work question at least once a week.","Ask someone what they wish they knew about you, and tell them."]},{area:"Processing the Emotional Side of Being New",insight:"Under difficulty, you solve and move on \u2014 the emotional residue of being new doesn't disappear, it resurfaces later as disengagement.",steps:["Name what you're feeling out loud, even briefly, before moving to solutions.","After a hard week, ask yourself how it felt, not just whether you got through it.","Build in real recovery time, not just after visible burnout."]},{area:"Building the Muscle of Small Talk and Connection",insight:"Connection is a skill like any other \u2014 under-used, it atrophies, and that's reversible with practice.",steps:["Once a week, start one conversation purely for connection, with no work agenda.","Sit with a moment of social discomfort for a few minutes without rushing to end it.","Reflect a colleague's feeling back to them before offering a solution, at least once."]}],growth:["Once a week, make one small decision purely on how it feels.","When a colleague shares a problem, try reflecting their feeling back before offering a solution.","Name your own reaction out loud in a team setting at least once a week.","After a hard week, ask yourself how it felt, not just whether you got through it.","Practice sitting with social discomfort for five minutes without rushing to fix it."]},{key:"head-dominant",range:[50,99],name:"Head-Dominant \u2014 Heads-Down and Analytical",color:sa,teaser:"Logic, competence, and independence are your default setting as the new person \u2014 capable, sometimes distant.",summary:"You operate primarily from the head, even this early in your career. Logic, competence, and independence are your default mode, and emotional or social input is often minimized or arrives late. This can look like strong early output from the outside, while you experience the new job as isolating.",strengths:["Composure and clarity even in a confusing or high-pressure first few months","Objectivity \u2014 your early work is less prone to people-pleasing or overreaction","Strong follow-through once you understand what's expected"],watchouts:["New relationships may feel one-sided or purely functional, even with good intent","Suppressed frustration with the ramp-up process tends to leak out as tension or a sudden sharp reaction","A nagging feeling about the team or the role is real data \u2014 dismissing it entirely removes useful information"],developmentAreas:"The growth path here is reconnecting with the social and emotional side of starting a new job as information, not weakness. A nagging sense that something's off with the team or the fit is data your analytical mind hasn't caught up to yet, and it deserves attention.",relationships:"Colleagues may read you as composed but hard to get to know. Your investment in doing well is often real but doesn't reliably surface where people can feel it, which can leave them unsure how to read you.",work:"You're a strong asset for technical, process-heavy, or high-focus early work. Emotion that goes unprocessed during onboarding doesn't disappear \u2014 it resurfaces as isolation or a sudden decision to leave that surprises everyone but you.",workingStyleTips:["Schedule genuine unstructured time with new colleagues \u2014 connection without an agenda builds relationships pure competence doesn't.","When asking for help, add one sentence about how you're feeling, not just what you need.","Before a stressful first presentation or meeting, check your own physical stress signals as a real input."],handlingDifficulty:"You handle early difficulty by controlling what you can and figuring out the rest analytically, which makes you genuinely capable even when confused. The cost shows up later: unprocessed stress about fitting in doesn't disappear, it resurfaces as isolation or burnout that seems to come from nowhere.",leadershipImpact:"Your manager and team likely respect your competence, but may not experience you as approachable this early. The specific risk: struggles get hidden longer than they should, because you'd rather solve it yourself than have the feeling.",cultureFitPrompt:"If your organization is genuinely relationship- and culture-driven, your heads-down default may be increasingly out of step with what actually gets rewarded \u2014 worth an honest look at whether connecting more would actually serve you here.",roadmap:[{area:"Treating Social Signals as Information",insight:"A nagging sense that something's off with the team or the role is data your analytical mind hasn't caught up to yet.",steps:["Before a high-stakes early meeting, check in on your own physical state as a real input.","When you notice a social stress signal, pause and name what might be going on before acting.","Keep a simple log of social signals and what they later turned out to mean."]},{area:"Making Your Investment Visible",insight:"Your investment in doing well is often genuine but doesn't reliably reach the people around you, which leaves them unsure how to read you.",steps:["Schedule genuine unstructured time with colleagues, with no agenda.","Say the thing you appreciate about a colleague out loud instead of assuming it's understood.","Ask directly what a colleague wishes they knew about you \u2014 then share it."]},{area:"Preventing the Delayed Cost of Unprocessed Onboarding Stress",insight:"Emotion that never gets processed during a hard ramp-up doesn't vanish \u2014 it resurfaces as isolation or a sudden decision to leave.",steps:["Build a small, regular check-in practice with yourself beyond task completion.","Ask one open, non-task question of your manager in every 1:1: how do you think I'm actually doing?","Notice patterns: does tension spike after specific kinds of unprocessed situations?"]},{area:"Giving Your Read on the Team a Real Vote",insight:"Dismissing a gut read on the team or the role entirely removes a genuine source of information your analytical process doesn't have access to.",steps:["Before dismissing a read on the team, ask what evidence would need to exist for you to take it seriously.","Write down instincts about the role or the fit you've overridden and revisit whether they were right.","Treat a strong, repeated read as equivalent in weight to a moderate amount of data."]}],growth:["Build in unstructured time with new colleagues, with no agenda or problem to solve.","When you notice a physical stress signal, pause and name what you're feeling before doing anything else.","Ask a colleague what they wish they knew about you, and take it seriously.","Once a day, name one feeling about your new job in one word, without analyzing why.","Before dismissing a read on the team or the role, ask what you'd need to see to take it seriously."]}],Np={DM:{whyItMatters:"How you make early decisions \u2014 even small ones \u2014 shapes how quickly you build credibility and how much autonomy you're given going forward.",high:{read:"Early decisions come from a felt sense of rightness first, with guidance used to sanity-check rather than lead.",tip:"Keep trusting your read, but check in with a mentor before decisions with real stakes while you're still building context."},mid:{read:"You draw on both instinct and guidance fairly evenly when deciding early on.",tip:"Notice which mode you default to when you're unsure \u2014 that's usually your true default."},low:{read:"You won't act until you've checked with someone else, even when it's really a read you could trust.",tip:"For your next low-stakes call, decide on instinct first, then check it after."}},RC:{whyItMatters:"The relationships you build in your first months set the tone for how supported \u2014 or isolated \u2014 the rest of your tenure feels.",high:{read:"You extend trust to new colleagues based on how they make you feel, not just their title.",tip:"Keep trusting your read, but give yourself permission to reassess as you learn more."},mid:{read:"You balance instinct with observation when deciding who to trust early on.",tip:"Notice if you extend trust faster to people similar to you \u2014 worth checking for bias."},low:{read:"You evaluate new colleagues mainly by usefulness, keeping emotional distance.",tip:"Pick one colleague this month and have a real, non-agenda conversation."}},EA:{whyItMatters:"Starting a new job is emotionally taxing whether you notice it or not \u2014 awareness is what lets you manage that load instead of being blindsided by it.",high:{read:"You notice your own nervousness or excitement in the moment rather than pushing it aside.",tip:"Keep naming it \u2014 it's a strength that will serve you well beyond onboarding."},mid:{read:"You notice your reactions sometimes, though busy weeks can bury them.",tip:"Build a 2-minute end-of-day check-in during your first few months especially."},low:{read:"You intellectualize your thy for new colleagues, though it takes more effort with some than others.",tip:"Notice who's easiest to empathize with, and extend that effort further."},low:{read:"You understand new colleagues' struggles intellectually more than you feel them.",tip:"In your next conversation with a struggling colleague, resist problem-solving first \u2014 just listen."}},AE:{whyItMatters:"The gap between how you actually feel and the \u201Cnew hire performance\u201D you put on costs energy daily, and people usually sense it even when they can't name it.",high:{read:"You show up as yourself, even when it's not the safest first-impression move.",tip:"Keep being real \u2014 authenticity early on builds trust faster than a polished performance."},mid:{read:"You're authentic in some early contexts, more guarded in others.",tip:"Pick your most guarded context and experiment with one honest disclosure."},low:{read:"You manage what you reveal to control your first impression.",tip:"Practice one small act of visible authenticity a week."}},SP:{whyItMatters:"How you handle the pressure of being new sets a pattern for how you'll handle pressure for the rest of your career.",high:{read:"When you feel out of your depth, you check in with how you feel and let that guide your next step.",tip:"Keep that instinct, and add one grounding practice for your hardest weeks."},mid:{read:"Your stress response shifts depending on the type of pressure.",tip:"Notice what kind of pressure makes you shut down vs. reach out."},low:{read:"Under pressure, you shut down and try to figure it out alone.",tip:"Next hard week, tell one colleague or mentor you're struggling \u2014 no solving required."}},VP:{whyItMatters:"What you're actually optimizing for in your first year \u2014 looking good or actually learning \u2014 quietly shapes the trajectory of your whole career.",high:{read:"Learning and genuine connection matter more to you right now than looking impressive fast.",tip:"Keep protecting that, and trust that it compounds even when it's not immediately visible."},mid:{read:"You hold both learning and looking capable as real priorities, weighing them situationally.",tip:"Notice which one wins when you're anxious \u2014 that's your truer default."},low:{read:"Looking capable matters more to you than how the learning process feels.",tip:"Before your next stretch task, ask what you'd choose if no one would ever know how it went."}},CS:{whyItMatters:"How you communicate as the new person determines whether people invest in you early, or wait to see if you're worth the effort.",high:{read:"You communicate with warmth and honesty, even about things you don't understand yet.",tip:"Keep the openness \u2014 it invites people to help you faster."},mid:{read:"You adjust communication style depending on the person and stakes.",tip:"Notice which relationships get your warmer register and which get the guarded one."},low:{read:"You default to facts and questions, and feelings rarely enter the conversation.",tip:"In your next check-in, add one sentence of feeling before the facts."}}},ll={personal:[{title:"3\u20135 Personal Development Areas",detail:"Not generic advice \u2014 the specific patterns showing up in your own answers, each with a concrete roadmap."},{title:"Full Subscale Radar & Breakdown",detail:"See exactly where your head overrides your heart, across all 10 areas of life, not just the headline number."},{title:"How You Handle Difficulty",detail:"Your real coping pattern under stress, including what it costs you and how to work with it."},{title:"A Working-Style Improvement Plan",detail:"Specific, practical tips for how this profile shows up at work \u2014 and what to actually do about it."},{title:"Your Sharpest Edge & Growth Edge",detail:"The one subscale where you're strongest, and the one quietly holding you back the most."},{title:"A Beautifully Designed, Shareable Report",detail:"A polished, multi-page report you can save, print, or revisit \u2014 built to actually b
