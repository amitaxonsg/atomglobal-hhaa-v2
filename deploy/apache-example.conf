<VirtualHost *:443>
    ServerName head-heart.atomglobal.com
    DocumentRoot /var/www/head-heart.atomglobal.com/current/frontend

    <Directory /var/www/head-heart.atomglobal.com/current/frontend>
        Options -Indexes
        AllowOverride None
        Require all granted
        FallbackResource /index.html
    </Directory>

    Alias /api /var/www/head-heart.atomglobal.com/current/backend/public
    <Directory /var/www/head-heart.atomglobal.com/current/backend/public>
        Options -Indexes
        AllowOverride None
        Require all granted
        DirectoryIndex index.php
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    SetEnvIf Request_URI "^/(admin|report|payment|assessment)" NOINDEX=1
    Header always set X-Robots-Tag "noindex, nofollow" env=NOINDEX
    ErrorLog ${APACHE_LOG_DIR}/head-heart-error.log
    CustomLog ${APACHE_LOG_DIR}/head-heart-access.log combined
</VirtualHost>
