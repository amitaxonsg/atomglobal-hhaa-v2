limit_req_zone $binary_remote_addr zone=head_heart_api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=head_heart_login:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name head-heart.atomglobal.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name head-heart.atomglobal.com;
    root /var/www/head-heart.atomglobal.com/current/frontend;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/head-heart.atomglobal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/head-heart.atomglobal.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com; form-action 'self' https://checkout.stripe.com; frame-ancestors 'self'; base-uri 'self'" always;

    client_max_body_size 12m;

    location = /api/admin/login {
        limit_req zone=head_heart_login burst=5 nodelay;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/head-heart.atomglobal.com/current/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/head-heart.atomglobal.com/current/backend/public;
        fastcgi_param HTTPS on;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    location ^~ /api/ {
        limit_req zone=head_heart_api burst=40 nodelay;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/head-heart.atomglobal.com/current/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/head-heart.atomglobal.com/current/backend/public;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_read_timeout 60s;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    location ^~ /media-uploads/ {
        alias /var/lib/head-heart-alignment/media/;
        access_log off;
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control "public, max-age=604800";
        location ~* \.php$ { deny all; }
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location ~* ^/(admin|report|payment|assessment) {
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Cache-Control "no-store" always;
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|webp|avif|woff2|png|jpg|jpeg|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\. { deny all; }
    location ~* \.(?:env|ini|log|sql|bak|sh)$ { deny all; }
}
