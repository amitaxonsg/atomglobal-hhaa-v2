server {
    listen 80;
    server_name head-heart.atomglobal.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name head-heart.atomglobal.com;
    root /var/www/head-heart.atomglobal.com/current/frontend;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/head-heart.atomglobal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/head-heart.atomglobal.com/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 12m;

    location ^~ /api/ {
        try_files $uri /index.php?$query_string;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/head-heart.atomglobal.com/current/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/head-heart.atomglobal.com/current/backend/public;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }

    location ~* ^/(admin|report|payment|assessment) {
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|webp|avif|woff2|png|jpg|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\. { deny all; }
}
