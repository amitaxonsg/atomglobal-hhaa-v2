name: Verify questionnaire reference CMS import

on:
  push:
    paths:
      - "scripts/export-assessment-reference.mjs"
      - "backend/bin/seed.php"
      - "tests/js/assessment-reference-export.test.mjs"
      - ".github/workflows/questionnaire-reference-cms.yml"
  pull_request:
    paths:
      - "scripts/export-assessment-reference.mjs"
      - "backend/bin/seed.php"
      - "tests/js/assessment-reference-export.test.mjs"
      - ".github/workflows/questionnaire-reference-cms.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify exact assessment reference export
        run: |
          node scripts/export-assessment-reference.mjs /tmp/head-heart-reference.json
          node - <<'NODE'
          const reference = require('/tmp/head-heart-reference.json');
          if (reference.reference.version !== '2.0.0') throw new Error('Wrong reference version');
          if (reference.reference.sourceFileSha256 !== '2626c5f1d1edaf50f4d140b0e93306700cac13c6fcefdff8a107e3b35966c7e8') throw new Error('Wrong attached index.html hash');
          if (reference.reference.questionnaireSha256 !== '379fdc28ddcbafab81af33f07cd8cd7a26364a68c98c5dab610c53087105741b') throw new Error('Wrong questionnaire aggregate hash');
          if (reference.tracks.length !== 4) throw new Error('Expected four tracks');
          for (const track of reference.tracks) {
            if (track.subscales.length !== 10) throw new Error(`${track.key}: expected 10 sections`);
            if (track.subscales.flatMap(section => section.items).length !== 50) throw new Error(`${track.key}: expected 50 questions`);
            if (track.answerChoices.length !== 5) throw new Error(`${track.key}: expected five scored choices`);
          }
          NODE

      - name: Validate PHP importer
        run: php -l backend/bin/seed.php

      - name: Run tests and production build
        run: |
          npm test
          npm run build

      - name: Record successful reference verification
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          mkdir -p docs/verification
          cat > docs/verification/questionnaire-cms-reference.md <<'MARKER'
          # Questionnaire CMS reference verification

          Automated verification passed for:

          - CMS assessment version: `2.0.0`
          - attached `index.html` SHA-256: `2626c5f1d1edaf50f4d140b0e93306700cac13c6fcefdff8a107e3b35966c7e8`
          - questionnaire aggregate SHA-256: `379fdc28ddcbafab81af33f07cd8cd7a26364a68c98c5dab610c53087105741b`
          - public tracks: Personal, New Joiner, Manager and Executive
          - each track: 10 sections, 50 questions and five scored choices
          - PHP importer syntax
          - full JavaScript test suite
          - production Vite build

          This marker is written only after the complete workflow succeeds.
          MARKER

          if git diff --quiet -- docs/verification/questionnaire-cms-reference.md && git ls-files --error-unmatch docs/verification/questionnaire-cms-reference.md >/dev/null 2>&1; then
            echo "Verification marker is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/verification/questionnaire-cms-reference.md
          git commit -m "Record verified questionnaire CMS reference"
          git push origin HEAD:main
