name: Fix four-card deployment gate

on:
  push:
    paths:
      - ".github/workflows/fix-four-card-deploy-gate.yml"

permissions:
  contents: write

jobs:
  fix-deploy-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Correct stale compiled-bundle check
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          deploy = Path("deploy/update-vps.sh")
          text = deploy.read_text()
          stale = "grep -R --include='*.js' -Fq 'liveTrackKey' dist/assets\n"
          if stale not in text:
              raise SystemExit("Stale compiled liveTrackKey check was not found")
          text = text.replace(stale, "", 1)
          text = text.replace(
              'echo "Questionnaire API: landing, one live assessment and four managed tracks verified."',
              'echo "Questionnaire API: landing, compatibility liveTrackKey and four public assessment tracks verified."',
              1,
          )
          deploy.write_text(text)

          test = Path("tests/js/deployment-nginx-release.test.mjs")
          text = test.read_text()
          text = text.replace(
              'assert.match(script, /landing, one live assessment and four managed tracks verified/);',
              'assert.match(script, /compatibility liveTrackKey and four public assessment tracks verified/);',
              1,
          )
          test.write_text(text)

          workflow = Path(".github/workflows/fix-four-card-deploy-gate.yml")
          workflow.unlink()
          PY

      - name: Install and test
        run: |
          npm ci --no-audit --no-fund
          npm test
          npm run build

      - name: Commit verified deployment correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix four-card production deployment gate"
          git push origin HEAD:main
