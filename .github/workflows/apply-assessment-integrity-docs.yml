name: Apply assessment integrity documentation

on:
  push:
    branches:
      - "assessment-integrity-repair-*"
    paths:
      - ".github/workflows/apply-assessment-integrity-docs.yml"
      - "backend/bin/repair-assessment-integrity.php"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add permanent Admin warning and README guidance
        run: |
          python3 <<'PY'
          from pathlib import Path

          admin_path = Path('src/components/admin/AdminCorePages.jsx')
          admin = admin_path.read_text()
          marker = 'export function AssessmentsPage() {'
          before, separator, after = admin.partition(marker)
          if not separator:
              raise SystemExit('AssessmentsPage was not found')
          old = '<Notice>{notice}</Notice><Notice type="error">{loader.error}</Notice>'
          new = '<Notice>{notice}</Notice><Notice type="error">{loader.error}</Notice><Notice><strong>Report integrity protection:</strong> The public frontend starts only the published assessment version for each track. Do not publish or delete versions manually just to tidy this list. Questions, scoring direction, profile score ranges and report templates must remain aligned. Use the verified integrity repair for obsolete unreferenced versions; historical versions used by participant sessions and reports are preserved.</Notice>'
          if new not in after:
              if old not in after:
                  raise SystemExit('AssessmentsPage notice insertion point was not found')
              after = after.replace(old, new, 1)
              admin_path.write_text(before + separator + after)

          readme_path = Path('README.md')
          readme = readme_path.read_text()
          heading = '## Assessment integrity repair and obsolete-record cleanup'
          section = '''## Assessment integrity repair and obsolete-record cleanup

The public frontend, Admin → Questionnaire, Admin → Assessments, participant entries, score snapshots and generated reports are linked through `assessment_tracks`, immutable `assessment_versions` and each session's `assessment_version_id`.

Production must have exactly one published assessment per public track — Personal, New Joiner, Manager and Executive — and each new session must use the exact published CMS version `2.0.0` containing 10 sections, 50 questions, five scored choices and its matching report templates.

Use `backend/bin/repair-assessment-integrity.php` to inspect or repair mixed version states:

- running it without options is read-only and reports every version, question/section/choice/report count and historical session/score reference count;
- apply mode requires the exact confirmation phrase `PUBLISH-EXACT-V2-AND-PRUNE-UNREFERENCED`;
- incomplete or draft `2.0.0` rows may be rebuilt only when no participant session or score snapshot references them;
- previous published versions are archived when exact `2.0.0` is published;
- `--prune-unreferenced` deletes only obsolete draft/archived questionnaire versions with zero sessions and zero score snapshots;
- participants, survey sessions, answers, score snapshots and generated reports are never deleted by this repair;
- historical assessment versions referenced by genuine records remain available so old reports continue to use their original question and scoring snapshots;
- every applied repair is written to `audit_logs`.

Before apply mode, retain the compressed MariaDB backup created by `deploy/update-vps.sh` or take an equivalent full database dump. Do not manually publish or delete rows merely to tidy Admin → Assessments.

'''
          if heading not in readme:
              insertion = '## Deployment routing and rollback\n'
              if insertion not in readme:
                  raise SystemExit('README insertion point was not found')
              readme = readme.replace(insertion, section + insertion, 1)
              readme_path.write_text(readme)
          PY

      - name: Commit generated documentation changes
        run: |
          if git diff --quiet -- README.md src/components/admin/AdminCorePages.jsx; then
            echo "Integrity documentation is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md src/components/admin/AdminCorePages.jsx
          git commit -m "Document assessment integrity repair safeguards"
          git push origin HEAD:${GITHUB_REF_NAME}
