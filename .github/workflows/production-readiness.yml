name: Production readiness checks

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - production-readiness-*

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate deployment scripts
        run: |
          bash -n deploy/update-vps.sh
          bash -n deploy/final-production-audit.sh
          bash -n deploy/full-production-audit.sh
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm test
      - run: npm run build
      - run: test -s dist/index.html

  php:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, json, mbstring, openssl, curl, dom, fileinfo
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          working-directory: backend
          composer-options: '--no-interaction --prefer-dist'
      - run: composer lint
        working-directory: backend
      - run: composer test
        working-directory: backend

  database:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: head_heart_test
          MYSQL_USER: head_heart
          MYSQL_PASSWORD: test-password
          MYSQL_ROOT_PASSWORD: root-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, json, mbstring, openssl, curl, dom, fileinfo
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          working-directory: backend
      - name: Configure test environment
        run: |
          cp backend/.env.example backend/.env
          sed -i 's#^APP_ENV=.*#APP_ENV=testing#' backend/.env
          sed -i 's#^APP_DEBUG=.*#APP_DEBUG=true#' backend/.env
          sed -i 's#^APP_KEY=.*#APP_KEY=base64:dGVzdC10ZXN0LXRlc3QtdGVzdC10ZXN0LXRlc3QtdGVzdA==#' backend/.env
          sed -i 's#^DB_HOST=.*#DB_HOST=127.0.0.1#' backend/.env
          sed -i 's#^DB_PORT=.*#DB_PORT=3306#' backend/.env
          sed -i 's#^DB_DATABASE=.*#DB_DATABASE=head_heart_test#' backend/.env
          sed -i 's#^DB_USERNAME=.*#DB_USERNAME=head_heart#' backend/.env
          sed -i 's#^DB_PASSWORD=.*#DB_PASSWORD=test-password#' backend/.env
          sed -i "s#^STORAGE_PATH=.*#STORAGE_PATH=${RUNNER_TEMP}/head-heart-storage#" backend/.env
          mkdir -p "${RUNNER_TEMP}/head-heart-storage/media" "${RUNNER_TEMP}/head-heart-storage/reports" "${RUNNER_TEMP}/head-heart-storage/tmp"
      - name: Run database migrations
        run: |
          set -o pipefail
          php backend/bin/migrate.php 2>&1 | tee database-migration.log
      - name: Seed assessment and settings
        run: |
          set -o pipefail
          php backend/bin/seed.php 2>&1 | tee database-seed.log
      - run: php tests/php/run.php
      - name: Run MySQL integration acceptance tests
        run: |
          set -o pipefail
          php tests/php/integration.php 2>&1 | tee database-integration.log
      - name: Run questionnaire process acceptance tests
        run: |
          set -o pipefail
          php tests/php/questionnaire-process.php 2>&1 | tee questionnaire-integration.log
      - name: Verify temporary participant submission and cleanup
        run: |
          set -o pipefail
          php backend/bin/production-submission-smoke-test.php \
            --recipient=production-smoke@example.test \
            --track=personal \
            --confirm=RUN-PRODUCTION-SUBMISSION-SMOKE \
            2>&1 | tee production-submission-smoke.log
          mysql -h 127.0.0.1 -P 3306 -u head_heart -ptest-password head_heart_test --batch --skip-column-names -e "
            SELECT COUNT(*) FROM participants WHERE email_normalized = 'production-smoke@example.test';
            SELECT COUNT(*) FROM email_queue WHERE recipient_email = 'production-smoke@example.test';
          " | tee production-submission-cleanup.log
          test "$(sed -n '1p' production-submission-cleanup.log)" = "0"
          test "$(sed -n '2p' production-submission-cleanup.log)" = "0"
      - name: Verify critical tables and seed records
        env:
          MYSQL_PWD: test-password
        run: |
          mysql -h 127.0.0.1 -P 3306 -u head_heart head_heart_test -e "
            SELECT COUNT(*) tracks FROM assessment_tracks;
            SELECT COUNT(*) track_settings FROM assessment_track_settings;
            SELECT COUNT(*) questions FROM questions;
            SELECT COUNT(*) templates FROM email_templates;
            SELECT COUNT(*) settings_count FROM global_settings;
            SELECT COUNT(*) stages FROM content_stages;
            SELECT COUNT(*) permissions_count FROM permissions;
            SELECT COUNT(*) migrations_count FROM migrations;
            SELECT COUNT(*) questionnaire_migration FROM migrations WHERE migration = '011_questionnaire_process_cms.sql';
            SELECT COUNT(*) na_column FROM information_schema.columns WHERE table_schema = DATABASE() AND table_name = 'survey_answers' AND column_name = 'is_not_applicable';
          " | tee database-verification.log
      - name: Upload database diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: database-diagnostics-${{ github.run_id }}
          path: |
            database-*.log
            questionnaire-*.log
            production-*.log
          if-no-files-found: ignore
          retention-days: 7
